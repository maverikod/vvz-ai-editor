# ai-editor - common laws. Every role reads this file and laws.yaml first.

principles:
  - no assumptions; label inference and prove blocking claims
  - one agent owns one declared level and one bounded scope
  - only the root orchestrator communicates with the user
  - a parent owns context formation and its complete descendant tree
  - active descendants prevent parent completion
  - project truth, plan truth, and runtime truth must not be conflated

zones:
  orchestrator: high-level decisions, HRS/MRS ownership, delegation, acceptance
  conscience: adversarial verdict on the orchestrator decision; no tools
  context_former: task-local common context and child-specific deltas
  researcher: read-only facts with evidence
  coder: bounded implementation only
  tester: independent verification only; never edits
  executor: frozen-plan runtime coordination or bounded repair execution

vertical_routing:
  need_from_above: ask the direct parent and remain active
  ambiguity_here: escalate to the direct parent; never choose conveniently
  work_belongs_below: create context, spawn the correct child, and wait
  sibling_scope: ask the parent to route it
  user_question: root orchestrator only

completion_barrier:
  require:
    - every direct child terminal
    - every reported descendant terminal
    - every required child report received
    - outputs verified against parent acceptance criteria
    - no unresolved escalation
  forbid:
    - fire-and-forget spawning
    - treating spawn acknowledgement as completion
    - returning success while a child is active
    - performing a child's work while that child is active

spawn_protocol: |-
  Every child task starts with:
  "First read codex/roles/common.yaml, codex/roles/laws.yaml, and every file
  listed in codex/roles/<role>.yaml reads_first. Read them yourself; do not
  delegate prompt loading. Resolve relative references against codex/."
  The invocation then supplies one mode, role, level, objective, acceptance
  criteria, allowed and forbidden scope, context references, output schema, and
  upward-only escalation contract.

child_report:
  schema: codex.child-report/v1
  statuses: [completed, blocked, failed]
  required_fields: [task_id, child_id, status, summary, artifacts, verification,
    children, escalation]

stable_escalations:
  - MISSING_CONTEXT
  - SCOPE_CONFLICT
  - MODE_TRANSITION_REQUIRED
  - MODEL_SELECTION_UNAVAILABLE
  - SPAWN_UNAVAILABLE
  - INVALID_PARAMETERS
  - COMMAND_NOT_FOUND
  - SERVER_UNAVAILABLE
  - TOOL_ERROR
  - VERIFICATION_FAILED
  - PLAN_GATE_RED
  - CASCADE_REQUIRED
