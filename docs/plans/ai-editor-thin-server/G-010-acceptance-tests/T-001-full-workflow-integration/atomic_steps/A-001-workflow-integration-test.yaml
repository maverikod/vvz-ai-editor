  ## Module-level helpers (implement exactly)

  ### `_mock_upstream(*, origin_bytes: bytes) -> MagicMock`

  1. `upstream = MagicMock()`
  2. `upstream.validate_ca_session.return_value = MagicMock(name="VALID")`
  3. `upstream.lock_file_and_download.return_value = origin_bytes`
  4. `upstream.upload_session_file_content.side_effect = lambda **kwargs: kwargs["content"]`
     — return uploaded bytes unchanged (simulates CA accept).
  5. `upstream.unlock_session_file.return_value = True`
  6. Return `upstream`.

  ### `_patch_context(*, workspace: Path, upstream: MagicMock)`

  ```python
  @contextmanager
  def _patch_context(*, workspace: Path, upstream: MagicMock):
      with patch(
          "ai_editor.core.editor_workspace_paths.resolve_workspace_root",
          return_value=workspace,
      ), patch(
          "ai_editor.core.upstream.code_analysis_client.get_code_analysis_client",
          return_value=upstream,
      ):
          yield
  ```

  Patch exactly these module paths (must not vary):
  `ai_editor.core.editor_workspace_paths.resolve_workspace_root` and
  `ai_editor.core.upstream.code_analysis_client.get_code_analysis_client`.

  ## Test constants

  - `workspace = tmp_path / "workspace"`
  - `sid = "ca-flow"`
  - `project_id = "p1"`
  - `file_path = "flow.txt"`  — plain text (FORMAT_TEXT); use this path only in this module
  - `origin_bytes = b"line one\n"`
  - `origin_text = origin_bytes.decode("utf-8")`
  - `edited_text = "line edited\n"`
  - `edited_bytes = edited_text.encode("utf-8")`

  ## Test: `test_full_workflow_open_edit_write_close_mock_upstream`

  Decorator: `@pytest.mark.asyncio`

  ### Algorithm

  1. `upstream = _mock_upstream(origin_bytes=origin_bytes)`
  2. Inside `_patch_context(workspace=workspace, upstream=upstream)`:

  **Step A — Open (C-010, C-005, C-022-1/2)**

  3. `open_cmd = UniversalFileOpenCommand()`
  4. `open_res = await open_cmd.execute(session_id=sid, project_id=project_id, file_path=file_path)`
  5. Assert `open_res.success` is True.
  6. Assert `open_res.data["session_id"] == sid`.
  7. Assert `str(workspace / sid) in open_res.data["session_dir"]`.
  8. `layout = file_workspace_layout(workspace, sid, project_id, file_path)`
  9. Assert `layout.origin_path.is_file()` and `layout.origin_path.read_bytes() == origin_bytes`.
  10. `draft_path = Path(open_res.data["draft_path"])`
  11. Assert `draft_path.is_file()` and `draft_path.read_bytes() == origin_bytes`.
  12. Assert `upstream.lock_file_and_download.assert_called_once()`.

  **Step B — Write unchanged no-op (C-012, C-022-3) — before edit**

  13. `write_cmd = UniversalFileWriteCommand()`
  14. `noop_res = await write_cmd.execute(
          session_id=sid,
          project_id=project_id,
          file_path=file_path,
          write_mode="commit",
      )`
  15. Assert `noop_res.success` is True.
  16. Assert `noop_res.data.get("unchanged") is True`.
  17. Assert `noop_res.data.get("uploaded") is False`.
  18. Assert `upstream.upload_session_file_content.call_count == 0`.
  19. Assert `layout.origin_path.read_bytes() == origin_bytes` — origin not rewritten on no-op.

  **Step C — Edit (C-011) — minimal workflow segment**

  20. `edit_cmd = UniversalFileEditCommand()`
  21. `edit_res = await edit_cmd.execute(
          session_id=sid,
          project_id=project_id,
          file_path=file_path,
          operations=[
              {
                  "type": "replace",
                  "start_line": 1,
                  "end_line": 1,
                  "content": edited_text,
              }
          ],
      )`
  22. Assert `edit_res.success` is True.
  23. Assert `draft_path.read_text(encoding="utf-8") == edited_text`.
  24. Assert `layout.origin_path.read_bytes() == origin_bytes` — origin still pre-upload snapshot.

  **Step D — Write changed upload (C-012, C-022-4)**

  25. `upload_res = await write_cmd.execute(
          session_id=sid,
          project_id=project_id,
          file_path=file_path,
          write_mode="commit",
      )`
  26. Assert `upload_res.success` is True.
  27. Assert `upload_res.data.get("unchanged") is False`.
  28. Assert `upload_res.data.get("uploaded") is True`.
  29. Assert `upstream.upload_session_file_content.call_count == 1`.
  30. `upload_call = upstream.upload_session_file_content.call_args`
  31. Assert `upload_call.kwargs["session_id"] == sid`.
  32. Assert `upload_call.kwargs["project_id"] == project_id`.
  33. Assert `upload_call.kwargs["file_path"] == file_path`.
  34. Assert `upload_call.kwargs["content"] == edited_bytes`.
  35. Assert `layout.origin_path.read_bytes() == edited_bytes` — Origin Snapshot synced after upload.

  **Step E — Close (C-013, C-022-5)**

  36. Assert `layout.file_subtree_dir.is_dir()` — subtree exists before close.
  37. Assert `layout.session_dir.is_dir()` — session dir exists before close.
  38. `close_cmd = UniversalFileCloseCommand()`
  39. `close_res = await close_cmd.execute(
          session_id=sid,
          project_id=project_id,
          file_path=file_path,
      )`
  40. Assert `close_res.success` is True.
  41. Assert `upstream.unlock_session_file.call_count == 1`.
  42. `unlock_call = upstream.unlock_session_file.call_args`
  43. Assert `unlock_call.kwargs["session_id"] == sid`.
  44. Assert `unlock_call.kwargs["project_id"] == project_id`.
  45. Assert `unlock_call.kwargs["file_path"] == file_path`.
  46. Assert `close_res.data.get("workspace_subtree_removed") is True` (when implemented).
  47. Assert `not layout.file_subtree_dir.exists()` — File Subtree removed from disk.
  48. Assert `not layout.session_dir.exists()` — Editor Session Directory removed (single-file session).

  ### Error handling expectations

  - Any command returning `ErrorResult`: fail via `assert result.success` (pytest shows payload).
  - Do not catch exceptions; no retry/skip logic.

  ### Edge cases covered

  - Plain `.txt` file — FORMAT_TEXT write compare uses draft bytes directly.
  - Pre-edit no-op then post-edit upload in one session.
  - Single-file session — both subtree and session directory removed on close.
  - Mock upload returns same bytes as sent — origin sync assertion uses `edited_bytes`.

