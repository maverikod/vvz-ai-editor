  ## Scope (T-001 — full workflow integration only)

  Acceptance verification for **C-022** criteria (1)–(4) via one integration test exercising
  **File Workflow (C-009)** stages with mock **Upstream Client (C-017)**:

  - **C-005** Editor Session Directory under `workspace_root/{ca_session_id}/`
  - **C-010** Open Stage — lock+download, Origin Snapshot + Edit Subdirectory
  - **C-011** Edit Stage — minimal in-workflow edit sufficient to prove C-022 workflow
    segment; Edit Subdirectory layout depth (C-008, C-022-2) is **out of scope** for this
    step — assert only that `draft_path` mutates while origin bytes stay pre-upload
  - **C-012** Write Stage — pre-edit no-op without CA upload; post-edit upload + Origin sync
  - **C-013** Close Stage — CA unlock + File Subtree removal

  ## Executable stage order (resolved for C-012 semantics)

  T-001 lists conceptual lifecycle `open → edit → write (unchanged) → write (changed) → close`.
  Because **C-012** no-op requires exported draft bytes equal **Origin Snapshot (C-007)** and
  **C-011** edit mutates the draft, the **unchanged write MUST run after open and before edit**.
  The single test executes:

  1. open (C-010)
  2. write commit — unchanged no-op (C-012); no `upload_session_file_content`
  3. edit — mutate draft (C-011)
  4. write commit — changed upload (C-012); origin bytes updated
  5. close (C-013); unlock + workspace subtree removed

  All five stages are asserted in one test function.

  ## MRS concepts (relevant excerpt)

  - **C-005**: `workspace_root/{session_id}/` holds all session artefacts.
  - **C-008**: Edit Subdirectory `{basename}-{uuid}/` under File Subtree; draft at
    `edit_subdir / basename`.
  - **C-009**: Commands `universal_file_open`, `universal_file_edit`, `universal_file_write`,
    `universal_file_close`.
  - **C-010**: Open downloads via CA mock, writes Origin Snapshot, allocates Edit Subdirectory.
  - **C-011**: Edit mutates draft inside Edit Subdirectory only.
  - **C-012**: `write_mode=commit` + equal bytes → `unchanged=True`, no upload RPC;
    diff → `upload_session_file_content`, then `session.abs_path.write_bytes(accepted)`.
  - **C-013**: Close calls `unlock_session_file`; removes File Subtree via `remove_file_subtree`;
    removes Editor Session Directory when last file closed.
  - **C-022**: Product checklist — session paths, open, write no-op, write upload, close cleanup.

