prompt: |
  Create `tests/integration/test_edit_subdir_edit_stage.py` (operation: create_file).

  Acceptance verification for **C-022 (2)** (open loads from CA into session directory
  and creates Edit Subdirectory), **C-008** (Edit Subdirectory under File Subtree),
  **C-007** (Origin Snapshot immutable during edit), **C-010** (Open Stage creates
  both artefacts), **C-011** (Edit Stage mutates only Edit Subdirectory; preview is
  read-only w.r.t. Origin Snapshot), and **C-009** (open → edit workflow segment).

  Mock Upstream Client in tests by patching these exact module paths:
  `resolve_workspace_root` at `ai_editor.core.editor_workspace_paths` and
  `get_code_analysis_client` at `ai_editor.core.upstream.code_analysis_client`.

  Scope boundary: this step covers open → edit (and preview) only — write/close cycle
  (C-012, C-013) is **out of scope**; create only the target file listed above.

  ## MRS concepts (relevant excerpt)

  - **C-007 Origin Snapshot**: local copy at `FileWorkspaceLayout.origin_path` inside
    File Subtree; must not change during Edit Stage (C-011).
  - **C-008 Edit Subdirectory**: `{origin_basename}-{uuid4}/` under `file_subtree_dir`;
    working copy at `edit_subdir / origin_basename` (= `session.draft_path`).
  - **C-010 Open Stage**: downloads from CA (mock), writes Origin Snapshot, allocates
    Edit Subdirectory via `allocate_edit_subdir`.
  - **C-011 Edit Stage**: mutations apply only to `draft_path` inside Edit Subdirectory;
    `universal_file_preview` is read-only and must not alter Origin Snapshot bytes.
  - **C-022 (2)**: product acceptance — open loads into `{workspace_root}/{session_id}/`
    and creates edit subdirectory (verified by filesystem layout after `universal_file_open`).

  ## Workspace path domain (read-only helpers for assertions)

  From `ai_editor.core.editor_workspace_paths`:

  ```python
  layout = file_workspace_layout(workspace_root, ca_session_id, project_id, file_path)
  # layout.session_dir       — Editor Session Directory (C-005)
  # layout.file_subtree_dir — File Subtree root (C-006)
  # layout.origin_path      — Origin Snapshot file path (C-007)
  ```

  Edit Subdirectory is **not** a field on `FileWorkspaceLayout`. After open, discover it
  as `Path(open_res.data["draft_path"]).parent` (C-008).

  ## File header (exact module docstring)

