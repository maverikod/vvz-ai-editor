step_id: G-010
name: Приёмка и тесты
description: >
  Доменная верификация критериев приёмки продукта C-022 Product Acceptance Criteria
  (source_spec {2a8s}): полный чеклист готовности thin AI Editor Server после
  реализации плана. Каждый критерий проверяется на уровне продуктового поведения:

  (1) Editor Session Directory layout — все артефакты сессии только под
  workspace_root/session_id;

  (2) Open Stage — загрузка с Upstream Client и создание Edit Subdirectory;

  (3) Write Stage — без изменений no-op без вызова СА; с изменениями upload и
  синхронизация Origin Snapshot;

  (4) Close Stage — снятие блокировки на СА и удаление поддерева файла;

  (5) конкуренция блокировок между CA sessions — вторая сессия не может открыть
  тот же файл, пока первая держит блокировку;

  (6) MCP Workflow Surface help — без дублирующих семейств команд.

  Исход G-010: подтверждённое прохождение полного чеклиста C-022.
