prompt: |
  Create `tests/integration/test_multi_file_ca_session.py` (operation: create_file).

  Acceptance verification for **T-002 Multi-file в одной CA Session**: two `file_path`
  values, one `ca_session_id`, two File Subtrees (C-006) under one Editor Session
  Directory (C-005), **write and close by explicit `file_path`**, product criterion
  **C-022(1)** (all session artifacts only under `workspace_root/session_id/`), and
  source_spec invariant **{8b1h}** (one CA session holds multiple open files; each
  file has its own subtree inside the shared `{session_id}/` directory).

  Mock Upstream Client in tests by patching `resolve_workspace_root` and
  `get_code_analysis_client` at the exact module paths below. Do **not** call real
  CA or read `config.json` workspace paths.

  ## Parent links (mandatory)

  - Global step: `docs/plans/ai-editor-thin-server/G-010-acceptance-tests/README.yaml`
  - Tactical step: `docs/plans/ai-editor-thin-server/G-010-acceptance-tests/T-002-multi-file-workspace-tests/README.yaml`
  - Machine spec: `docs/plans/ai-editor-thin-server/spec.yaml` (C-004, C-006, C-022)
  - Source spec: `docs/plans/ai-editor-thin-server/source_spec.md` paragraph `{8b1h}`

  ## MRS concepts (relevant excerpt)

  - **C-004 CA Session**: one `session_id` may hold multiple open files; write/close
    disambiguate by `file_path` when N>1.
  - **C-006 File Subtree**: per `(project_id, file_path)` under session; removed on
    close of that file; sibling subtrees remain.
  - **C-022 Product Acceptance Criteria (1)**: all files of the session exist only
    under `workspace_root/session_id/`.

  ## Source invariant {8b1h}

  One CA session may hold locks and open files for **multiple** paths simultaneously.
  Each file has its own subtree inside the shared `{session_id}/` directory.

  ## Workspace path helpers (read-only assertions)

  From `ai_editor.core.editor_workspace_paths`:

  ```python
  layout = file_workspace_layout(workspace_root, ca_session_id, project_id, file_path)
  # layout.session_dir       — Editor Session Directory (C-005), equals workspace_root / ca_session_id
  # layout.file_subtree_dir  — File Subtree root (C-006)
  # layout.origin_path       — Origin Snapshot path (C-007)
  ```

  Edit Subdirectory is discovered after open as `Path(open_res.data["draft_path"]).parent`.

