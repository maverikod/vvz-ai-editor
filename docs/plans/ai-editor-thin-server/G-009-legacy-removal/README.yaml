name: Удаление legacy-кода
description: 'Удалить из кодовой базы редактора весь инвентарь Legacy Removal Scope (C-020): локальную
  БД проектов, воркеры, поиск и анализ как MCP; устаревшие публичные MCP-семейства сессий и передачи
  файлов; отдельный идентификатор группы редактирования в файловом workflow редактора; дублирующие клиентские
  контракты. После шага ни на публичной MCP-поверхности, ни в локальной персистентности редактора
  не остаётся компонентов объёма C-020. Границы ответственности редактора (C-021) сохраняются:
  создание проектов, полнотекстовый и семантический поиск, CST-анализ и комплексный анализ на стороне
  СА, управление фоновыми очередями СА остаются вне области редактора.

  '
