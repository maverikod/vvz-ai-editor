  ## Goal (C-004, C-005, C-006, C-009, C-016)

  Add multi-file bundle introspection and a single disambiguation entry point used by
  edit/write/close. Produce `multi_file_bundle` payload for open responses ({8b1h}).

  ## Imports to add

  - None new (use existing `Dict`, `Any`, `List`, `Optional`, `Path`).

  ## EditSession dataclass — add optional fields (after `is_invalid`)

  ```python
  workspace_origin_path: Optional[Path] = None
  workspace_edit_subdir: Optional[Path] = None
  ```

  Remove the `session.__dict__["workspace_origin_path"]` hack in `create_session`; assign
  the two new dataclass fields directly in the `EditSession(...)` constructor call.

  ## New functions (add after `lookup_ca_session_id`)

  ### `def bundle_file_count(ca_session_id: str) -> int`
  Docstring: "Return number of open files in the ca_session bundle."

  Algorithm:
  1. `bundle = _session_bundles.get(str(ca_session_id or "").strip())`
  2. Return `0` if bundle is None else `len(bundle)`.

  ### `def bundle_has_multiple_files(ca_session_id: str) -> bool`
  Docstring: "Return True when the bundle holds more than one open file."

  Algorithm: return `bundle_file_count(ca_session_id) > 1`.

  ### `def list_bundle_file_paths(ca_session_id: str) -> List[str]`
  Docstring: "Return sorted project-relative file_path keys for the bundle."

  Algorithm:
  1. `bundle = _session_bundles.get(str(ca_session_id or "").strip())`
  2. If bundle is None: return `[]`.
  3. Return `sorted(bundle.keys())` (keys are already normalized posix paths).

  ### `def resolve_session_for_command(ca_session_id: str, file_path: Optional[str]) -> EditSession`
  Docstring: "Resolve EditSession for workflow commands; enforce file_path when N>1."

  Algorithm:
  1. Call `get_session(ca_session_id, file_path=file_path)`.
  2. On `ValueError` with message exactly `"SESSION_FILE_PATH_REQUIRED"`: re-raise same.
  3. On other `ValueError`: re-raise unchanged.
  4. Return session.

  (Thin wrapper — keeps one import site for edit/write/close AS.)

  ### `def build_multi_file_bundle_payload(ca_session_id: str) -> Dict[str, Any]`
  Docstring: "Build multi_file_bundle object for universal_file_open success (C-006)."

  Algorithm:
  1. `sid = str(ca_session_id or "").strip()`
  2. `bundle = _session_bundles.get(sid)`
  3. If bundle is None or empty: return
     `{"session_id": sid, "open_file_count": 0, "files": []}`.
  4. Build `files: List[Dict[str, Any]]` by iterating `sorted(bundle.items())`:
     for each `(norm_path, session)` append dict:
     ```python
     {
         "file_path": session.file_path,
         "project_id": session.project_id,
         "origin_path": str(
             session.workspace_origin_path
             if session.workspace_origin_path is not None
             else session.abs_path
         ),
         "draft_path": str(session.draft_path),
         "edit_subdir": str(
             session.workspace_edit_subdir
             if session.workspace_edit_subdir is not None
             else session.core.session_dir
         ),
     }
     ```
  5. Return `{"session_id": sid, "open_file_count": len(files), "files": files}`.

  ## create_session changes

  - Pass `workspace_origin_path=workspace_origin_path` and
    `workspace_edit_subdir=workspace_edit_subdir` into `EditSession(...)` constructor
    (dataclass fields), not via `__dict__`.

  ## Error handling

  - `build_multi_file_bundle_payload`: never raises; empty bundle → zero count.
  - `resolve_session_for_command`: propagates `ValueError` from `get_session`.
  - `bundle_file_count` / `list_bundle_file_paths`: never raise for unknown session_id.

  ## Edge cases

  - Single-file bundle: `build_multi_file_bundle_payload` returns `open_file_count: 1`.
  - `workspace_origin_path` None → fall back to `session.abs_path` in payload.
  - `workspace_edit_subdir` None → fall back to `session.core.session_dir`.

  ## Forbidden

  - Do NOT reintroduce `uuid` or auto-generated session ids (T-001 owns registry).
  - Do NOT change `get_session` / `release_session` disambiguation rules.
  - Do NOT modify open/edit/write/close command modules in this AS.
  - Do NOT add methods not listed above.

  ## MRS

  C-004: one ca_session_id, many File Subtrees; C-006: per-file origin/edit paths;
  C-005: shared session_dir across files in bundle.

