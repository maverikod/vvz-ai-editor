  ## Goal (C-004, C-005, C-006, C-009, C-016)

  T-003 scope: multi-file **disambiguation** for `universal_file_close` only.
  T-004 owns CA unlock + workspace subtree deletion — do **not** add upstream unlock here.

  ## Required changes

  ### Imports
  Add to errors import: `SESSION_FILE_PATH_REQUIRED`.
  Add to session import: `list_bundle_file_paths`, `resolve_session_for_command`.
  Remove `get_session` if unused after change.

  ### `get_schema()` — `file_path` description
  Replace description with:
  `"Project-relative path. Required when the CA session has more than one open file (see multi_file_bundle from open). Optional when exactly one file is open."`

  ### `execute()` — session resolution
  1. Replace `get_session(...)` with `resolve_session_for_command(session_id, file_path or None)`.
  2. Map `SESSION_FILE_PATH_REQUIRED` → `make_error(SESSION_FILE_PATH_REQUIRED, "file_path is required when the session has multiple open files", details={"session_id": session_id})`.
  3. Map other → `SESSION_NOT_FOUND` as today.

  ### `execute()` — after `release_session(session_id, session.file_path)`
  Before `return SuccessResult(data=payload)`:
  1. `remaining = list_bundle_file_paths(session_id)` — paths still open **after** release.
  2. Set `payload["closed_file_path"] = session.file_path` (the file just closed).
  3. Set `payload["remaining_open_files"] = remaining`.
  4. Set `payload["session_retained"] = len(remaining) > 0` (True when Editor Session Directory C-005 kept because other files remain).

  Keep existing format-group close, lockfile delete, `session.core.close()` order unchanged.

  ## Error handling

  | Condition | Code |
  |-----------|------|
  | N>1, file_path omitted | SESSION_FILE_PATH_REQUIRED |
  | Unknown session/file | SESSION_NOT_FOUND |

  ## Edge cases

  - Close last file in bundle: `remaining_open_files=[]`, `session_retained=False`.
  - Close one of two: `remaining_open_files` lists the other path, `session_retained=True`.
  - Single-file close without file_path: still allowed (resolve_session_for_command picks sole file).

  ## Forbidden

  - Do NOT call `CodeAnalysisClient.unlock_session_file` (T-004).
  - Do NOT `shutil.rmtree` Editor Session Directory (T-004).
  - Do NOT change `_close_sidecar` / `_close_tree_temp_or_text` bodies.
  - Do NOT modify other files.

  ## MRS

  Close disambiguation: C-004 session bundle + C-009 file_path routing when N>1 — not Close Stage unlock (delegated to T-004). C-005 directory retained until last file; per-file File Subtree (C-006).

