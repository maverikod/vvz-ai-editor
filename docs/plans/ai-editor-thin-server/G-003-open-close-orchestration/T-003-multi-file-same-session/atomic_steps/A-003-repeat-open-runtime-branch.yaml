  ## Edge cases

  - First open (`bundle_file_count==0`): `ensure_session_directory` runs; `repeat_open=False`; `multi_file_bundle.open_file_count==1` after success.
  - Second open same `ca_session_id`, different `file_path`: skip `ensure_session_directory`; new File Subtree only; `repeat_open=True`; `multi_file_bundle.open_file_count==2`.
  - Same `file_path` already in bundle: blocked at step 1a (`lookup_ca_session_id`) or `create_session` `FILE_ALREADY_IN_SESSION` (baseline handler unchanged).
  - `session_dir` in response unchanged across files in bundle (`str(layout.session_dir)`).
  - Tree-temp and fallback opens: repeat-open policy applies identically; payload still includes `multi_file_bundle`.

