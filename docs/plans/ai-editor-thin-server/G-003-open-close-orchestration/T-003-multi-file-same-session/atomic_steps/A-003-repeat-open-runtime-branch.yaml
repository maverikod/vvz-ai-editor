  - New response keys: `"multi_file_bundle"`, `"repeat_open"` (boolean).
  - `is_repeat_open` threshold: `bundle_file_count(ca_session_id) >= 1`.
  - All baseline literals unchanged (`"OPEN_ERROR"`, `PARSE_ERROR`, `SESSION_NOT_FOUND`, UTF-8 encode, etc.).

