  ## Method logic ‚Äî step-by-step algorithm (delta on first-file orchestration baseline)

  Apply these changes to `run_open_execute` only. All steps not listed here remain **identical** to CURRENT FILE above.

  ### Insert after step 1 (param parse), before upstream client call

  **Step 1a ‚Äî duplicate-file guard (C-004, C-006)**

  1. If `project_id` is non-empty:
     - `existing_sid = lookup_ca_session_id(project_id, file_path)`
  2. Else:
     - `existing_sid = None`
  3. If `existing_sid is not None`:
     - Return `error_result_from_make_error(make_error(PARSE_ERROR, f"File already open in session {existing_sid}: {file_path}"))`
     - (Covers same-session and cross-session duplicate.)

  ### Replace unconditional `ensure_session_directory` (step 4 in baseline)

  **Step 4 ‚Äî session directory policy ({8b1h}, C-005)**

  After `workspace_root = resolve_workspace_root()`:

  1. `is_repeat_open = bundle_file_count(ca_session_id) >= 1`
  2. If **not** `is_repeat_open`:
     - `ensure_session_directory(workspace_root, ca_session_id)` ‚Äî first file (initial open path).
  3. If `is_repeat_open`:
     - **Do not** call `ensure_session_directory` (Editor Session Directory already exists).
     - Proceed directly to `file_workspace_layout` / new File Subtree (C-006).

  All subsequent steps (`layout`, `ensure_file_subtree`, `allocate_edit_subdir`, `resolve_and_create_draft` with `paths.edit_subdir`, `create_session`, `write_lockfile_pid` with `paths.session_source_path`, tree-temp/fallback branches) ‚Äî **unchanged** from CURRENT FILE.

  ### Extend success payload (step 11 in baseline)

  After building `data` dict and before `return SuccessResult(data=data)`:

  1. `data["multi_file_bundle"] = build_multi_file_bundle_payload(ca_session_id)`
  2. `data["repeat_open"] = is_repeat_open`

  `is_repeat_open` was computed in step 4 **before** `create_session` registers the new file (so first open ‚Üí `False`; second+ open ‚Üí `True`).

