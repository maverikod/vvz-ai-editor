       - else: return `error_result_from_make_error(make_error(SESSION_NOT_FOUND, f"Unknown session: {ca_session_id}"))`
  9. Detect last file in bundle **before** release:
     - `is_last_file = len(list_bundle_file_paths(ca_session_id)) == 1`
  10. Best-effort CA unlock (C-017/C-023, C-015 terminating):
      - `client = get_code_analysis_client()`
      - `unlock_ok = client.unlock_session_file(session_id=ca_session_id, project_id=pid, file_path=session.file_path)`
      - Do **not** return early when `unlock_ok` is False — always continue local cleanup.
  11. Format-group facade cleanup (existing helpers):
      - If `session.format_group == FORMAT_SIDECAR`: `payload = self._close_sidecar(session)`
      - Else: `payload = self._close_tree_temp_or_text(session)`
  12. Close core session and deregister bundle entry:
      - `session.core.close()`
      - `release_session(ca_session_id, session.file_path)` — removes from `_session_bundles` and `_file_open_index`
