  ### execute() algorithm (C-013 Close Stage on multi-file disambiguation baseline)

  1. `_ = kwargs`
  2. `ca_session_id = str(session_id or "").strip()`
  3. `pid = str(project_id or "").strip()`
  4. `guard = SessionGuard(get_code_analysis_client())`
  5. `decision = guard.check(OperationKind.CLOSE, ca_session_id)`
  6. If `decision == GuardDecision.REJECT`:
     - Return `ErrorResult(message="session_id is required for universal_file_close", code=cast(Any, "SESSION_REJECTED"))`
  7. If `decision` is `GuardDecision.ALLOW` or `GuardDecision.ALLOW_TERMINATING`: continue (both permit close).
  8. Resolve local session (multi-file disambiguation — preserve exactly):
     - `try: session = resolve_session_for_command(ca_session_id, file_path or None)`
     - On `ValueError`:
