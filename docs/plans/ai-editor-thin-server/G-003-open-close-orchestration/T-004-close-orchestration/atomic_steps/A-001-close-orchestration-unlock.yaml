      - `payload["session_dir_removed"] = is_last_file`
      - Return `SuccessResult(data=payload)`

  ### Error handling per method

  - `execute`:
    - Guard REJECT (empty ca_session_id): `ErrorResult` code `SESSION_REJECTED`; no unlock, no disk writes.
    - Multi-file without file_path: `SESSION_FILE_PATH_REQUIRED` with `details={"session_id": ca_session_id}`; no unlock.
    - Local session not found: `error_result_from_make_error` with `SESSION_NOT_FOUND`; no unlock after failed resolve.
    - `unlock_session_file` returns False: log at INFO `"close unlock best-effort failed for %s/%s"`, (ca_session_id, session.file_path); continue cleanup.
    - `resolve_workspace_root` / `file_workspace_layout` raises `ValidationError`: propagate (not caught in execute).
    - `remove_file_subtree` / `shutil.rmtree`: let `OSError` propagate.
  - `_close_sidecar`, `_close_tree_temp_or_text`: unchanged; propagate exceptions from tree/draft operations.

  ### Edge cases

  - Multi-file session closing one file: `is_last_file=False`; `session_retained=True`; `remaining_open_files` lists other paths; `session_dir` kept; only that `file_subtree_dir` removed.
  - Single-file session: `is_last_file=True`; `remaining_open_files=[]`; `session_retained=False`; both subtree and `session_dir` removed.
  - Close without file_path when N>1: `SESSION_FILE_PATH_REQUIRED`; no orchestration runs.
  - CA session NOT_FOUND (guard ALLOW_TERMINATING): unlock returns False; local cleanup and multi-file payload fields still run.
  - Unlock idempotent (NOT_LOCKED): `unlock_ok=False`; local cleanup still runs.
  - `pid` empty string: still passed to `unlock_session_file` and layout resolver (upstream/layout may fail unlock; subtree path uses empty project segment — do not synthesize project_id from session record).

