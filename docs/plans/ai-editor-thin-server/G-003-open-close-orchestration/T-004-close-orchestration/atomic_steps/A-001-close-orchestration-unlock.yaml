  - **C-017 Upstream Client**: only path to CA lock/unlock RPCs.
  - **C-023 CA API Contract**: unlock via `session_close_file` wrapped by `unlock_session_file`.
  - **C-024 Session Guard**: `check(CLOSE, ca_session_id)` → ALLOW or ALLOW_TERMINATING; REJECT only for empty id.

