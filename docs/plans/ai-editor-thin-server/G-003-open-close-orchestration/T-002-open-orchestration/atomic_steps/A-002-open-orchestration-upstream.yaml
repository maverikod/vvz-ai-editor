  ## Method logic ŌĆö step-by-step algorithm

  ### `run_open_execute`

  1. Read params from `kwargs`:
     - `ca_session_id = str(kwargs.get("session_id", "")).strip()`
     - `project_id = str(kwargs.get("project_id", "")).strip()`
     - `file_path = str(kwargs.get("file_path", "")).strip()`
     - `create = bool(kwargs.get("create", False))`
     - `initial_content = str(kwargs.get("initial_content", "") or "")`
     - (Facade already validated non-empty `session_id`; runtime still reads from kwargs.)

  2. `client = get_code_analysis_client()`.

  3. Upstream lock + download (C-017, C-023):
     - If `create` is True:
       - `raw_bytes = client.upload_create_and_lock(session_id=ca_session_id, project_id=project_id, file_path=file_path, content=initial_content.encode("utf-8"))`
     - Else:
       - `raw_bytes = client.lock_file_and_download(ca_session_id, project_id, file_path)`
     - On `RuntimeError` as `exc`: return `ErrorResult(message=str(exc), code=cast(Any, "OPEN_ERROR"))`.

  4. Workspace paths (C-005, C-006, C-007, C-018):
     - `workspace_root = resolve_workspace_root()`
     - `ensure_session_directory(workspace_root, ca_session_id)`
     - `layout = file_workspace_layout(workspace_root, ca_session_id, project_id, file_path)`
     - `ensure_file_subtree(layout)`

  5. Allocate Edit Subdirectory (C-008) ŌĆö **not** from `layout`:
     - `paths = allocate_edit_subdir(file_subtree_dir=layout.file_subtree_dir, origin_filename=layout.origin_path.name)`

  6. Write Origin Snapshot (C-007):
     - Call `layout.origin_path.parent.mkdir(parents=True, exist_ok=True)` unconditionally before writing the origin snapshot (idempotent when parent already exists).
     - `layout.origin_path.write_bytes(raw_bytes)`

  7. Draft + Internal Edit Engine (C-008, C-019):
     - `descriptor_result = resolve_and_create_draft(layout.origin_path, paths.edit_subdir, project_id)`
     - If `isinstance(descriptor_result, dict)`: return `error_result_from_make_error(descriptor_result)`

  8. Extract optional metadata from descriptor (mutate `descriptor.__dict__`):
     - `fallback_info = descriptor.__dict__.pop("_fallback_info", None)`
     - `tree_temp_kwargs = descriptor.__dict__.pop("_tree_temp_session_kwargs", None)`
     - `tree_id: Optional[str] = getattr(descriptor, "tree_id", None)`

  9. Register command-layer session (C-004 bundle):
     - Build `session_extra: Dict[str, Any] = {}`
     - If `fallback_info is not None`: set `is_invalid=True`, `fallback_reason`, `original_format_group` from dict keys
     - `try`:
       - If `tree_temp_kwargs is not None`:
         - `session = create_session(abs_path=paths.origin_path, descriptor=descriptor, file_path=file_path, project_id=project_id, ca_session_id=ca_session_id, project_root=paths.edit_subdir, tree_id=None, workspace_session_root=layout.session_dir, workspace_file_subtree_root=layout.file_subtree_dir, workspace_origin_path=paths.origin_path, workspace_edit_subdir=paths.edit_subdir, **tree_temp_kwargs, **session_extra)`
         - If `session.tree_temp_roots is not None`: `draft_text = serialize_tree_temp_roots(session.handler_id, session.tree_temp_roots)`; `apply_source_mutation(session, draft_text)`
       - Else:
         - `session = create_session(abs_path=paths.origin_path, descriptor=descriptor, file_path=file_path, project_id=project_id, ca_session_id=ca_session_id, project_root=paths.edit_subdir, tree_id=tree_id, workspace_session_root=layout.session_dir, workspace_file_subtree_root=layout.file_subtree_dir, workspace_origin_path=paths.origin_path, workspace_edit_subdir=paths.edit_subdir, **session_extra)`
     - `except ValueError as exc`:
       - If `str(exc) == "FILE_ALREADY_IN_SESSION"`: return `error_result_from_make_error(make_error(PARSE_ERROR, f"File already open in session {ca_session_id}: {file_path}"))`
       - If `str(exc) == "SESSION_NOT_FOUND"`: return `error_result_from_make_error(make_error(SESSION_NOT_FOUND, f"Unknown session: {ca_session_id}"))`
       - Re-raise other `ValueError`

  10. In-session lockfile (C-019 preview artefact, inside Edit Subdirectory):
      - `write_lockfile_pid(paths.session_source_path, os.getpid(), ca_session_id)`
      - Use `paths.session_source_path` (edit working copy), **not** `layout.origin_path`.

  11. Build success payload:
      - `data: Dict[str, Any] = {"success": True, "session_id": ca_session_id, "file_path": file_path, "session_dir": str(layout.session_dir), "draft_path": str(session.draft_path), "available_operations": list(descriptor.available_operations)}`
      - If `create`: `data["created"] = True`
      - If `fallback_info is not None`: add `is_invalid`, `fallback_reason`, `warning` (`open_fallback_warning(reason)`), `mode_notice` (`mode_notice_text(True, reason)`)
      - Else: `data["mode_notice"] = mode_notice_text(False)`
      - Do **not** include `core_session_id` in response.

  12. Return `SuccessResult(data=data)`.

  ## Error handling per method

  | Condition | Action |
  |-----------|--------|
  | `RuntimeError` from upstream client | Return `ErrorResult`, code `"OPEN_ERROR"` |
  | `resolve_and_create_draft` returns dict | `error_result_from_make_error(dict)` |
  | `ValueError("FILE_ALREADY_IN_SESSION")` from `create_session` | `PARSE_ERROR` via `make_error` |
  | `ValueError("SESSION_NOT_FOUND")` from `create_session` | `SESSION_NOT_FOUND` via `make_error` |
  | Other exceptions | Propagate to facade `except Exception` handler |

  Do **not** catch bare `except:`.

  ## Edge cases

  - First file in CA Session: `ensure_session_directory` creates Editor Session Directory; bundle auto-created in `create_session`.
  - Second file same `ca_session_id` (T-003): reuses existing `layout.session_dir`; new `allocate_edit_subdir` under new File Subtree.
  - `create=True` with empty `initial_content`: upload empty bytes (facade validates `.py` requires content).
  - `allocate_edit_subdir` race (`FileExistsError`): propagate (no retry).
  - Tree-temp open: apply serialized roots to draft via `apply_source_mutation` after `create_session`.
  - Text fallback at open: include `mode_notice` / `warning` in response.

  ## Constants and literals

  - Error codes: `"OPEN_ERROR"`, `"PARSE_ERROR"`, `"SESSION_NOT_FOUND"` (via `make_error` / `cast(Any, ...)` only where facade pattern uses cast).
  - UTF-8 encoding for `initial_content.encode("utf-8")`.
  - Success field `session_id` value = `ca_session_id` (C-004).
  - `session_dir` in response = `str(layout.session_dir)` (Editor Session Directory C-005).

  ## Forbidden patterns

  - Do NOT use `layout.edit_subdir` ŌĆö `FileWorkspaceLayout` has no such field.
  - Do NOT import or call `get_project_root`, `_resolve_project_root`, `_resolve_abs_path`, or write to CA project tree.
  - Do NOT write outside `{workspace_root}/{ca_session_id}/` subtree.
  - Do NOT make `run_open_execute` async.
  - Do NOT implement SessionGuard here (facade only).
  - Do NOT return `core_session_id` in success payload.
  - Do NOT call `write_lockfile_pid` with `layout.origin_path` ŌĆö use `paths.session_source_path`.
  - Do NOT modify files other than the target file.
  - Do NOT add functions other than `run_open_execute`.
  - Do NOT use bare `except:`.

