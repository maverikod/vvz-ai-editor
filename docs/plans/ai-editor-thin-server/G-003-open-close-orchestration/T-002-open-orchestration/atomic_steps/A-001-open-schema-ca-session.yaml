  1. `params = super().validate_params(params)`
  2. `sid = str(params.get("session_id", "")).strip()`
  3. If `sid == ""`:
     - Raise `ValidationError("session_id is required for universal_file_open", field="session_id")`
  4. `params["session_id"] = sid`
  5. Return `params`

  Do **not** add create/initial_content validation here (unchanged from baseline; runtime handles create branch).

  ### Error handling (validate_params)

  - Only raise `ValidationError` for empty/whitespace-only `session_id`.
  - Do not catch exceptions from `super().validate_params()` — let them propagate.

  ### Edge cases (validate_params)

  - `session_id` missing from params → treated as empty → `ValidationError` field `session_id`.
  - `session_id` whitespace-only → `ValidationError` field `session_id`.
  - Non-empty `session_id` → stripped value written back to `params["session_id"]`.

