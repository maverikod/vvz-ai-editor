  ## Scope (T-004 only ŌĆö fixes F-036 path anchor, F-026 boundary)

  **IN scope:** `draft_path` and `lockfile_path` only. Both are siblings of the edit working copy (`edit_source_path`) inside **Edit Subdirectory (C-008)** within **File Subtree (C-006)**.

  Path anchor rule (resolved ŌĆö no "or"): `edit_source_path` is the working-copy file inside Edit Subdirectory (e.g. `{edit_subdir}/{origin_filename}`). `draft_path` and `lockfile_path` are computed from `edit_source_path` as base, never from Origin Snapshot path and never from canonical project file path on CA host.

