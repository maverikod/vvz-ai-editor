  ## New functions (add after `lockfile_path_for`, before `read_lockfile_pid`)

  ### `draft_path_for_edit_source(edit_source_path: Path) -> Path`

  Docstring one line: `Return draft path as sibling of edit_source_path inside Edit Subdirectory.`

  Algorithm:
  1. Return `edit_source_path.with_suffix(edit_source_path.suffix + ".draft")`.
  2. Do not branch on format_group. Do not use `.cst_sidecar`.

  Edge cases:
  - `edit_source_path` = `/ws/sid/files/pid/src/foo.py` ŌåÆ `/ws/sid/files/pid/src/foo-{uuid}/foo.py.draft` when edit_source is inside edit subdir.
  - Extensionless name `README` ŌåÆ `README.draft`.

  Error handling: none (pure path transform).

  ### `lockfile_path_for_edit_source(edit_source_path: Path) -> Path`

  Docstring one line: `Return in-session write lockfile path as sibling of edit_source_path inside Edit Subdirectory.`

  Algorithm:
  1. Return `edit_source_path.with_suffix(edit_source_path.suffix + ".write")`.

  Edge cases:
  - Same parent directory as `edit_source_path` and `draft_path_for_edit_source` output.

  Error handling: none (pure path transform).

  ### `resolve_format_group_for_edit_source(edit_source_path: Path) -> FormatDescriptor`

  Docstring:
  ```
  Resolve format group where draft_path and lockfile_path are siblings of edit_source_path
  inside Edit Subdirectory (C-008), not beside canonical project file on CA host.
  ```

  Algorithm:
  1. `handler_id = resolve_handler(str(edit_source_path), "read")` inside try/except RegistryError ŌåÆ raise `ValueError("UNKNOWN_FORMAT") from exc` (same as `resolve_format_group`).
  2. `format_group = _HANDLER_TO_FORMAT[handler_id]`.
  3. `draft_path = draft_path_for_edit_source(edit_source_path)` ŌĆö NOT `draft_path_for`.
  4. `lockfile_path = lockfile_path_for_edit_source(edit_source_path)` ŌĆö NOT `lockfile_path_for`.
  5. `available_ops = list(_FORMAT_AVAILABLE_OPERATIONS[format_group])`.
  6. Return `FormatDescriptor(format_group=..., handler_id=..., draft_path=..., lockfile_path=..., available_operations=available_ops)`.

  Error handling:
  - `RegistryError` from `resolve_handler` ŌåÆ `ValueError("UNKNOWN_FORMAT")` (re-raise chain preserved).

  Edge cases:
  - Python file in edit subdir: `format_group` is `FORMAT_SIDECAR` but `draft_path` ends with `.draft` (not `.cst_sidecar`) ŌĆö sidecar path is T-006.
  - JSON/YAML: `format_group` is `FORMAT_TREE_TEMP`; `draft_path` still `.draft` suffix only in this step.

