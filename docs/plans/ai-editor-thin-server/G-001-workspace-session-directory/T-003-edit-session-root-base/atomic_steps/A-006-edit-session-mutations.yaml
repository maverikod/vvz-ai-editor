  ## Functions to implement (signatures + one-line docstrings)

  Move verbatim logic from `ai_editor/core/edit_session/edit_session.py` private methods
  and module-level helpers, adapting `self` → first `session: EditSession` parameter:

  | Function | Source in monolith |
  |----------|-------------------|
  | `checkout_history_index(session, index: int) -> None` | `EditSession.checkout_history_index` body |
  | `undo(session) -> dict[str, object]` | `EditSession.undo` body; call `checkout_history_index(session, target)` |
  | `redo(session) -> dict[str, object]` | `EditSession.redo` body |
  | `record_revert_commit(session, *, rev: str) -> str` | `EditSession.record_revert_commit` body |
  | `export_source_via_unmark(session) -> None` | `_export_source_via_unmark` |
  | `update_session_tree_checksums(session, source_sha256: str) -> None` | `_update_session_tree_checksums` |
  | `build_session_tree(session, source_text: str) -> bool` | `_build_session_tree` |
  | `try_revalidate(session) -> None` | `_try_revalidate`; call `build_session_tree`, `export_source_via_unmark`, `update_session_tree_checksums` as module functions |
  | `preview_external_write(session) -> dict[str, Any]` | `preview_external_write` |
  | `confirm_external_copy_out(session) -> None` | `confirm_external_copy_out` |
  | `close(session) -> None` | `close`; import `_active_sessions` from `.edit_session_impl` inside function |
  | `record_tree_modification(session) -> None` | `record_tree_modification`; raise same RuntimeError |

  ## try_revalidate algorithm (fix vs monolith)

  1. If `session.tree_validity != SessionTreeValidity.INVALID`: return
  2. Read source_text from session_source_path
  3. Try parse via HandlerRegistry; on any Exception return
  4. If not `build_session_tree(session, source_text)`: return
  5. `export_source_via_unmark(session)`
  6. Update checksums, set VALID, commit_full, record history — same as monolith

  ## Error handling

  - `checkout_history_index`, `undo`, `redo`, `preview_external_write`, `confirm_external_copy_out`:
    same RuntimeError messages as monolith when session not open or preconditions fail
  - `close`: pop from `_active_sessions`; rmtree session_dir if exists; set is_open False

  ## Edge cases

  - `preview_external_write`: missing external files → empty string in diff baseline
  - `confirm_external_copy_out`: no changes → early return; VALID mode atomic two-file replace

  ## Forbidden patterns

  - Do NOT import `sidecar_path_for` in this module
  - Do NOT add draft/lockfile path helpers
  - Do NOT relocate tree_abs to workspace edit subdir (T-006)
  - Do NOT modify `edit_session.py` monolith in this AS

