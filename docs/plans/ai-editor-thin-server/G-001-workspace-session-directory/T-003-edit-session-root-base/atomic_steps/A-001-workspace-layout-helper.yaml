  import uuid
  from dataclasses import dataclass
  from pathlib import Path
  ```

  ## Class skeleton

  ```python
  @dataclass(frozen=True)
  class CoreSessionPaths:
      """Paths for one core EditSession workspace-mode open."""

      origin_path: Path
      edit_subdir: Path
      session_source_path: Path
      session_dir: Path
  ```

  Fields:
  - `origin_path`: sibling file in file_subtree_dir (C-007 location, not copied here)
  - `edit_subdir`: `{origin_basename}-{uuid4}/` under file_subtree_dir (C-008)
  - `session_source_path`: `edit_subdir / origin_basename` (working copy target)
  - `session_dir`: alias of `edit_subdir` (in-session artefact root for this open)

  ## Function signature

  ```python
  def allocate_edit_subdir(*, file_subtree_dir: Path, origin_filename: str) -> CoreSessionPaths:
      """Create ``file_subtree_dir/{origin_filename}-{uuid4}/`` (mkdir only).

      Does not copy origin snapshot; caller writes ``origin_path`` separately.
      """
  ```

  ## Method algorithm: allocate_edit_subdir

  1. `name = Path(origin_filename).name`
  2. If `not name`: raise `ValueError("origin_filename must be non-empty")`
  3. `subdir_name = f"{name}-{uuid.uuid4()}"`
  4. `edit_subdir = (file_subtree_dir / subdir_name).resolve()`
  5. `edit_subdir.mkdir(parents=True, exist_ok=False)` — must fail if exists
  6. `origin_path = file_subtree_dir / name`
  7. `session_source_path = edit_subdir / name`
  8. Return `CoreSessionPaths(origin_path=..., edit_subdir=..., session_source_path=..., session_dir=edit_subdir)`

  ## Error handling

  - Empty origin_filename → `ValueError("origin_filename must be non-empty")`
  - mkdir race / exists → propagate `FileExistsError` from `mkdir(exist_ok=False)`

  ## Edge cases

  - `origin_filename` with directories → only basename used (`Path(...).name`)
  - Relative `file_subtree_dir` → resolved before mkdir

  ## Constants

  - UUID suffix separator: `"-"` in `f"{name}-{uuid.uuid4()}"`

  ## Forbidden patterns

  - Do NOT import or call `sidecar_path_for`
  - Do NOT compute draft_path or lockfile_path
  - Do NOT create tree-temp directories
  - Do NOT modify files other than target + new unit test file

  ## Tests (create `tests/unit/test_workspace_layout.py`)

  - `test_allocate_edit_subdir_creates_unique_subdir`: tmp_path subtree; call twice with
    same origin name; assert two distinct edit_subdir paths under subtree; assert
    origin_path is sibling in subtree; assert session_source_path inside edit_subdir.

