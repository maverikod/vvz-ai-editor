  Modify `config.json` at project root (operation: modify_file).

  ## MRS excerpt (C-018 Workspace Root Configuration)

  Настраиваемый корень `workspace_root` на стороне редактора для каталогов сессий.
  Путь `workspace_root/session_id` для каждой CA Session. Не смешивается с деревом
  проекта СА. Монтируется в контейнере вместе с логами и конфигурацией.

  ## Task

  1. Locate existing top-level `"ai_editor"` object.
  2. Inside `"ai_editor"`, add `"storage"` object if absent.
  3. Set exactly one workspace key inside `"storage"`:

  ```json
  "storage": {
    "workspace_root": "data/editor_workspaces"
  }
  ```

  4. Preserve all other existing `ai_editor` keys unchanged:
     `git_commit_on_write`, `host`, `port`, `log`, `dirs`.
  5. Do not add, rename, or reference `editor_workspace_dir` anywhere in this file.
  6. Do not remove or rename `code_analysis_server` or any other top-level section.

  ## Path resolution rule

  `workspace_root` value `"data/editor_workspaces"` is relative to the directory
  containing `config.json` (same rule as `ai_editor/core/storage_paths.py`
  `_resolve_path(config_dir, value)` uses for other storage paths).

  ## Constants

  - Config key path: `ai_editor.storage.workspace_root`
  - Default dev value: `"data/editor_workspaces"`

  ## Forbidden

  - Do NOT use key name `editor_workspace_dir`
  - Do NOT add alias keys or fallback keys for workspace path
  - Do NOT modify files other than `config.json`
  - Do NOT add secrets

  ## Validation

  Run from project root with `.venv` activated:

  ```bash
  python -c "import json; d=json.load(open('config.json')); assert d['ai_editor']['storage']['workspace_root']=='data/editor_workspaces'; print('ok')"
  ```

  Expected: prints `ok` and exits 0.

  ```bash
  python -m json.tool config.json > /dev/null
  ```

  Expected: exit 0 (valid JSON).
