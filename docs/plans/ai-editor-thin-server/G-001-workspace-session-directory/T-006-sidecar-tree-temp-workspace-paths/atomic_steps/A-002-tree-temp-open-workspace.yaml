  ## Path resolution (replace single `sidecar_path = sibling_tree_path(...)` line)

  Algorithm at start of `acquire_tree_temp_for_open` after `current_sha` computed:

  1. `current_sha = hashlib.sha256(raw_source_bytes).hexdigest()` (unchanged).
  2. If `workspace_mode`:
     - `origin_resolved = workspace_origin_path.resolve()`
     - `edit_resolved = workspace_edit_root.resolve()`
     - `edit_source_path = edit_resolved / origin_resolved.name`
     - `read_sidecar_path = sibling_tree_path(origin_resolved)`
     - `write_sidecar_path = sibling_tree_path(edit_source_path)`
     - `active_session_path = origin_resolved`
  3. Else (legacy):
     - `read_sidecar_path = sibling_tree_path(source_abs.resolve())`
     - `write_sidecar_path = read_sidecar_path`
     - `active_session_path = source_abs.resolve()`
  4. `loaded = _read_trees_sidecar_optional(read_sidecar_path)` — use **read** path only.
  5. `resolve_sha_sync_policy(..., active_session_holds_file=active_session_uses_abs_path(active_session_path))` — use `active_session_path`.
  6. Branch handling (NO_SIDECAR, SHA_MATCH, etc.) — **unchanged** logic using `loaded`.
  7. Return `TreeTempOpenAcquisition(..., sidecar_path=write_sidecar_path, ...)` — use **write** path.

  Return value specification:
  - `roots`: unchanged semantics.
  - `source_sha256`: SHA-256 hex of `raw_source_bytes`.
  - `sidecar_path`: **write** path (edit subdir in workspace mode; legacy sibling path otherwise).
  - `sidecar_write_intent`: unchanged enum.

