  ## New module-level helper (add before `EditSession` class)

  ```python
  def _session_sidecar_in_edit_subdir(
      session_dir: Path,
      session_source_path: Path,
  ) -> Path:
      """Return CST sidecar path inside Edit Subdirectory (C-008)."""
  ```

  Docstring one line: `Return CST sidecar path inside Edit Subdirectory (C-008).`

  Signature: `def _session_sidecar_in_edit_subdir(session_dir: Path, session_source_path: Path) -> Path`

  Algorithm:
  1. `resolved_dir = session_dir.resolve()`
  2. `resolved_source = session_source_path.resolve()`
  3. Try `resolved_source.relative_to(resolved_dir)`; on `ValueError` raise `EditSessionError("WORKSPACE_PATH_ESCAPE", "session_source_path must be inside session_dir (edit subdir)")`.
  4. Return `sibling_tree_path(resolved_source)`.

  Error handling:
  - `session_source_path` not under `session_dir` → `EditSessionError("WORKSPACE_PATH_ESCAPE", ...)`.

  Edge cases:
  - `session_dir=/ws/sid/files/pid/edit-uuid`, `session_source_path=.../edit-uuid/foo.py` → `.../edit-uuid/foo.py.tree`.
  - Extensionless `README` working copy → `README.tree`.

  ## Modified `open()` workspace branch (replace workspace open steps 9–14)

  After step 8 (`source_checksum` computed) in workspace_mode block:

  1. **Do NOT** call `sidecar_path_for` or `validate_or_recreate_tree_file`.
  2. `session_tree_path = _session_sidecar_in_edit_subdir(session_dir, session_source_path)`.
  3. `tree_abs = session_tree_path` (authoritative in-session sidecar; not external CA path).
  4. If `session_tree_path.is_file()`:
     - `shutil.copy2` is NOT needed (already in place).
     - Read `session_tree_path` text; compute `tree_checksum` via `compute_content_checksum`.
     - Try parse `source_text` with `HandlerRegistry`; if parse succeeds and `is_tree_valid(source_checksum, tree_checksum)` using checksum from sidecar CHECKSUMS section when parseable, set `tree_validity = VALID`; else `INVALID`.
     - For validity: use same `is_tree_valid` + `ref_content_checksum` pattern as legacy when sidecar exists — read checksum from parsed tree file if possible; if parsing fails, `tree_validity = INVALID`.
     - Simplified binding: if `session_tree_path.is_file()` and parse of source_text succeeds, attempt `parse_tree_file` on sidecar; if `sections.checksums.get("source_sha256") == source_checksum`, set `VALID`; else `INVALID`.
  5. Else (no sidecar file yet):
     - `tree_validity = SessionTreeValidity.INVALID`
     - `tree_checksum = None`
  6. `include_tree = tree_validity == SessionTreeValidity.VALID and session_tree_path.is_file()`
  7. Continue with `SessionRepo.init(...)` and session construction unchanged from workspace open
     mode.

  ## Modified `apply_cst_sidecar_mutation`

  Algorithm (prepend guard before writes):
  1. If not `self.is_open`: raise `RuntimeError("EditSession is not open")`.
  2. If `self.workspace_session_root is not None` (workspace mode):
     - `resolved_sidecar = sidecar_abs.resolve()`
     - `resolved_dir = self.session_dir.resolve()`
     - Try `resolved_sidecar.relative_to(resolved_dir)`; on `ValueError` raise `EditSessionError("WORKSPACE_SIDECAR_ESCAPE", f"sidecar must be under edit subdir {resolved_dir}, got {resolved_sidecar}")`.
  3. Existing body unchanged: write source, `shutil.copy2(sidecar_abs, self.session_tree_path)`, checksums, commit.

  Error handling:
  | Condition | Exception |
  |-----------|-----------|
  | Workspace mode + sidecar outside edit subdir | `EditSessionError("WORKSPACE_SIDECAR_ESCAPE", ...)` |
  | Session closed | `RuntimeError("EditSession is not open")` |

  Edge cases:
  - Legacy mode (`workspace_session_root is None`): no sidecar path guard; behavior unchanged.
  - `sidecar_abs` equals `session_tree_path`: allowed (same resolved path under edit subdir).

