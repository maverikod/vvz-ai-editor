  ## MRS excerpt (concepts for this step only)

  - **C-005 Editor Session Directory**: `workspace_root/session_id/` — root of all local session artifacts.
  - **C-006 File Subtree**: per `(project_id, file_path)` subtree inside Editor Session Directory; contains Origin Snapshot and (later) Edit Subdirectory.
  - **C-007 Origin Snapshot**: immutable local copy at a path inside File Subtree (basename of `file_path`).
  - **C-008 Edit Subdirectory**: child directory `{origin_basename}-{uuid}/` inside File Subtree; **NOT** resolved by `file_workspace_layout` — allocation is deferred to `allocate_edit_subdir` in `workspace_layout.py`.
  - **C-018 Workspace Root Configuration**: canonical config key `ai_editor.storage.workspace_root` in `config.json`.

