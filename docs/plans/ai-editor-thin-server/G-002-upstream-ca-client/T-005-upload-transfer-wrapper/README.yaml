name: Обёртка upload transfer
description: 'Добавить в Upstream Client (C-017) chunked upload/save для Write Stage (C-012): передача содержимого рабочей копии на СА после локального сравнения с Origin Snapshot (C-007). Возвращает подтверждение принятого содержимого для обновления origin. Upstream Client — единственный путь записи на диск проекта СА ({1u2o}, свойство C-017). Граница C-017: core-клиент предоставляет публичную thin-обёртку upload с session/file-контекстом; sibling transfer-слой выполняет chunked upload bytes и получение transfer_id. Downstream вызывает только публичную поверхность core-клиента.

  '
