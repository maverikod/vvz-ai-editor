description: 'Добавить в Upstream Client (C-017) оркестрацию Open Stage (C-010) на стороне СА: блокировка по контракту C-023 для CA Session, project_id и file_path; передача содержимого с СА для записи в Origin Snapshot (C-007). Граница C-017: core-клиент координирует session/file-контекст и RPC lock; sibling transfer-слой выполняет нормализацию пути, resolve file_path→file_id и chunked download bytes. Публичная поверхность Upstream Client для downstream — только core-клиент; Origin Snapshot получает содержимое через thin-обёртку core. Прямой доступ к диску проекта СА не используется (свойство C-017).

  '
