step_id: G-002
name: Upstream-клиент к Code Analysis Server
description: 'Расширить Upstream Client (C-017) внутренними обёртками над CA API Contract (C-023): Session Validation (C-014) через touch session_id; Open Stage (C-010) — блокировка и передача содержимого с СА; Close Stage (C-013) — разблокировка; Write Stage (C-012) — chunked upload/save; Edit Stage preview-path (C-011) — передача содержимого без блокировки; create-path Open Stage — upload затем lock. Resolve file_path→file_id через контракт C-023. В контракте C-023 на СА имена open/close означают lock/unlock, не editor workflow (свойство C-017). Централизовать конфигурацию подключения (host, port, TLS, timeout, server_id). Upstream Client — единственный путь изменения блокировок и содержимого на стороне СА; прямой SQL и файловый доступ к дереву проекта СА запрещены (свойства C-017).

  '
executor_brief: 'Модульная граница C-017: реализация разделена на два sibling-модуля без изменения публичного API Upstream Client — downstream workflow импортирует только code_analysis_client. Модуль code_analysis_client — ядро клиента: singleton, конфигурация и RPC, discovery проектов и файлов, Session Validation (C-014), публичные thin-обёртки lock/unlock/upload/download; делегирует byte-transfer sibling-модулю. Модуль code_analysis_file_transfer — вспомогательный transfer-слой: нормализация относительного пути, resolve file_path→file_id, chunked download/upload bytes; не экспортируется из пакетного __init__; обращается к client только через TYPE_CHECKING / отложенный импорт во избежание циклической зависимости. Распределение по контракту C-023: session/file контекст и RPC-оркестрация Open (C-010), Preview (C-011), Write (C-012), Close (C-013) — code_analysis_client; pipeline передачи содержимого — code_analysis_file_transfer.

  '
