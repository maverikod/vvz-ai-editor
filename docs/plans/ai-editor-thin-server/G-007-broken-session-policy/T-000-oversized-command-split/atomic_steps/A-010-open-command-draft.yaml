prompt: "Create `ai_editor/commands/universal_file_edit/open_command_draft.py` (operation: create_file).\n\nDraft helpers for workspace open (C-008, C-016). All paths under Edit Subdirectory in File Subtree — never project disk on CA host.\n\n```py\n\"\"\"Draft acquisition for universal_file_open in workspace mode (C-016, C-008).\n\nAuthor: Vasiliy Zdanovskiy\nemail: vasilyvz@gmail.com\n\"\"\"\n\nfrom __future__ import annotations\n\nimport shutil\nfrom pathlib import Path\nfrom typing import Any, Dict, Optional, Union\n\nfrom ai_editor.commands.universal_file_edit.errors import PARSE_ERROR, UNKNOWN_FORMAT, make_error\nfrom ai_editor.commands.universal_file_edit.format_group import (\n    FORMAT_SIDECAR,\n    FORMAT_TEXT,\n    FORMAT_TREE_TEMP,\n    FormatDescriptor,\n    draft_path_for,\n    lockfile_path_for,\n    resolve_format_group_for_edit_source,\n)\nfrom ai_editor.commands.universal_file_edit.tree_temp_open_support import acquire_tree_temp_for_open\n\n\ndef resolve_and_create_draft(\n\
  \    workspace_origin_path: Path,\n    workspace_edit_subdir: Path,\n    project_id: str,\n) -> Union[FormatDescriptor, Dict[str, Any]]:\n    \"\"\"Resolve format group and create draft under workspace edit subdir.\"\"\"\n    origin = workspace_origin_path.resolve()\n    edit_root = workspace_edit_subdir.resolve()\n    try:\n        descriptor = resolve_format_group_for_edit_source(origin)\n    except ValueError:\n        return make_error(\n            UNKNOWN_FORMAT,\n            f\"Unsupported file type: {origin.suffix}\",\n        )\n    original_fg = descriptor.format_group\n    try:\n        tree_id = _write_draft(origin, edit_root, descriptor, project_id)\n        descriptor.__dict__[\"tree_id\"] = tree_id\n    except Exception as exc:\n        if original_fg in (FORMAT_TREE_TEMP, FORMAT_SIDECAR):\n            try:\n                return _text_fallback_descriptor(\n                    origin, edit_root, original_fg, str(exc)\n                )\n            except Exception:\n \
  \               pass\n        return make_error(PARSE_ERROR, f\"Cannot parse file: {exc}\")\n    return descriptor\n\n\ndef _text_fallback_descriptor(\n    origin: Path,\n    edit_root: Path,\n    original_fg: str,\n    parse_error: str,\n) -> FormatDescriptor:\n    \"\"\"Build a text-mode descriptor after parse failure at open.\"\"\"\n    text_descriptor = FormatDescriptor(\n        format_group=FORMAT_TEXT,\n        handler_id=\"text\",\n        draft_path=draft_path_for(origin, edit_root, FORMAT_TEXT),\n        lockfile_path=lockfile_path_for(origin, edit_root),\n        available_operations=[\"insert\", \"delete\", \"replace\"],\n    )\n    shutil.copy2(str(origin), str(text_descriptor.draft_path))\n    text_descriptor.__dict__[\"tree_id\"] = None\n    text_descriptor.__dict__[\"_fallback_info\"] = {\n        \"fallback_reason\": parse_error,\n        \"original_format_group\": original_fg,\n    }\n    return text_descriptor\n\n\ndef _write_draft(\n    origin: Path,\n    edit_root:\
  \ Path,\n    descriptor: FormatDescriptor,\n    project_id: str,\n) -> Optional[str]:\n    fg = descriptor.format_group\n    if fg == FORMAT_SIDECAR:\n        return _write_sidecar_draft(origin)\n    if fg == FORMAT_TREE_TEMP:\n        return _write_tree_temp_draft(origin, edit_root, descriptor)\n    if fg == FORMAT_TEXT:\n        shutil.copy2(str(origin), str(descriptor.draft_path))\n        return None\n    raise ValueError(f\"Unknown format group: {fg!r}\")\n\n\ndef _write_sidecar_draft(origin: Path) -> Optional[str]:\n    from ai_editor.core.cst_tree import tree_builder as cst_builder\n    from ai_editor.tree.handler_registry import HandlerRegistry\n\n    source_text = origin.read_text(encoding=\"utf-8\")\n    HandlerRegistry.default_registry().resolve(origin).parse_content(\n        Path(origin.name),\n        source_text,\n    )\n    tree = cst_builder.load_file_to_tree(str(origin))\n    return str(tree.tree_id)\n\n\ndef _write_tree_temp_draft(\n    origin: Path,\n    edit_root:\
  \ Path,\n    descriptor: FormatDescriptor,\n) -> Optional[str]:\n    raw_bytes = origin.read_bytes()\n    acq = acquire_tree_temp_for_open(\n        project_root=edit_root,\n        source_abs=origin,\n        handler_id=descriptor.handler_id,\n        raw_source_bytes=raw_bytes,\n    )\n    descriptor.__dict__[\"_tree_temp_session_kwargs\"] = {\n        \"tree_id\": None,\n        \"source_sha256_at_open\": acq.source_sha256,\n        \"tree_temp_roots\": acq.roots,\n        \"sidecar_write_intent\": acq.sidecar_write_intent.value,\n    }\n    shutil.copy2(str(origin), str(descriptor.draft_path))\n    return None\n```\n\nExports `resolve_and_create_draft` and private `_write_*` helpers consumed by `ai_editor/commands/universal_file_edit/open_command_runtime.py` (upstream open orchestration in G-003/T-002). Imports `resolve_format_group_for_edit_source`, `draft_path_for`, `lockfile_path_for` from `format_group.py` (workspace edit-subdir variants).\n"
