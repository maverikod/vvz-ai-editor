prompt: "Create `ai_editor/commands/universal_file_edit/write_command_phases.py` (operation: create_file).\n\n```py\n\"\"\"Write phase helpers for universal_file_write (C-016, C-012).\n\nAuthor: Vasiliy Zdanovskiy\nemail: vasilyvz@gmail.com\n\"\"\"\n\nfrom __future__ import annotations\n\nimport os\nimport tempfile\nfrom pathlib import Path\nfrom typing import Any, Optional\n\nfrom mcp_proxy_adapter.commands.result import ErrorResult, SuccessResult\n\nfrom ai_editor.commands.universal_file_edit.errors import (\n    FORMAT_INVALID_ON_OPEN,\n    WRITE_FAILED,\n    error_result_from_make_error,\n    make_error,\n)\nfrom ai_editor.commands.universal_file_edit.format_group import (\n    FORMAT_SIDECAR,\n    delete_lockfile,\n    lockfile_write_preview_ready,\n    read_lockfile_pid,\n    write_lockfile_pid,\n)\nfrom ai_editor.commands.universal_file_edit.session import EditSession\nfrom ai_editor.commands.universal_file_edit.tree_temp_write_commit import (\n    build_tree_temp_preview_text,\n\
  \    commit_tree_temp_to_disk,\n    serialize_tree_temp_session_source,\n)\nfrom ai_editor.core.backup_manager import BackupManager\nfrom ai_editor.core.cst_tree.node_stable_id import strip_inline_node_id_lines_from_source\nfrom ai_editor.core.cst_tree.tree_builder import get_tree as get_cst_tree\nfrom ai_editor.core.file_handlers.diff_support import unified_diff_text\nfrom ai_editor.core.git_integration import commit_after_write\nfrom ai_editor.commands.universal_file_edit.invalid_write_support import (\n    mode_notice_text,\n    restore_session_format_after_recovery,\n    try_clear_invalid_after_write,\n    validate_invalid_session_for_commit,\n)\n\ndef tree_temp_preview(session: EditSession) -> SuccessResult | ErrorResult:\n    try:\n        code = build_tree_temp_preview_text(\n            abs_path=session.abs_path,\n            session=session,\n        )\n    except Exception as exc:\n        return error_result_from_make_error(\n            make_error(WRITE_FAILED, f\"Preview generation\
  \ failed: {exc}\")\n        )\n    original = session.abs_path.read_text(encoding=\"utf-8\")\n    diff = unified_diff_text(\n        original,\n        code,\n        before_label=str(session.abs_path),\n        after_label=str(session.abs_path),\n    )\n    return SuccessResult(\n        data={\n            \"success\": True,\n            \"phase\": \"preview\",\n            \"write_mode\": \"preview\",\n            \"diff\": diff,\n        }\n    )\n\ndef tree_temp_write_commit( self, session: EditSession, project_id: str ) -> SuccessResult | ErrorResult:\n    fp_parts = Path(session.file_path).parts\n    root_dir = session.abs_path.parents[len(fp_parts) - 1]\n    rel = session.abs_path.relative_to(root_dir)\n    rel_str = str(rel)\n    bm = BackupManager(root_dir)\n    bm.create_backup(session.abs_path, command=\"universal_file_write\")\n    try:\n        sha_hex, diff = commit_tree_temp_to_disk(\n            session=session,\n            project_id=project_id,\n            bm=bm,\n\
  \            rel_str=rel_str,\n        )\n    except ValueError as exc:\n        bm.restore_file(rel_str)\n        return error_result_from_make_error(make_error(WRITE_FAILED, str(exc)))\n    except OSError as exc:\n        bm.restore_file(rel_str)\n        return error_result_from_make_error(\n            make_error(WRITE_FAILED, f\"Write failed: {exc}\")\n        )\n\n    delete_lockfile(session.abs_path)\n    if not session.is_invalid:\n        try_clear_invalid_after_write(session)\n    try:\n        commit_after_write(\n            root_dir,\n            [rel],\n            command_name=\"universal_file_write\",\n            config_data={},\n        )\n    except Exception:\n        pass\n    return SuccessResult(\n        data={\n            \"success\": True,\n            \"phase\": \"committed\",\n            \"write_mode\": \"commit\",\n            \"diff\": diff,\n            \"source_sha256_at_open\": sha_hex,\n            \"is_invalid\": session.is_invalid,\n            \"\
  mode_notice\": mode_notice_text(\n                session.is_invalid, session.fallback_reason\n            ),\n        }\n    )\n\ndef generate_code(session: EditSession) -> str:\n    fg = session.format_group\n    if fg == FORMAT_SIDECAR:\n        tid = session.tree_id\n        if not tid:\n            raise ValueError(\n                \"Session has no registered tree id for sidecar format.\",\n            )\n        tree = get_cst_tree(tid)\n        if tree is None:\n            raise ValueError(\n                f\"CST tree {tid!r} not found in memory.\",\n            )\n        return cast(\n            str,\n            strip_inline_node_id_lines_from_source(str(tree.module.code)),\n        )\n    if fg == FORMAT_TREE_TEMP:\n        return serialize_tree_temp_session_source(session)\n    return str(session.draft_path.read_text())\n\ndef text_preview(session: EditSession) -> SuccessResult | ErrorResult:\n    try:\n        code = generate_code(session)\n    except Exception as exc:\n\
  \        return error_result_from_make_error(\n            make_error(WRITE_FAILED, f\"Preview generation failed: {exc}\")\n        )\n    original = session.abs_path.read_text(encoding=\"utf-8\")\n    diff = unified_diff_text(\n        original,\n        code,\n        before_label=str(session.abs_path),\n        after_label=str(session.abs_path),\n    )\n    return SuccessResult(\n        data={\n            \"success\": True,\n            \"phase\": \"preview\",\n            \"write_mode\": \"preview\",\n            \"diff\": diff,\n        }\n    )\n\ndef text_write_commit( self, session: EditSession, project_id: str ) -> SuccessResult | ErrorResult:\n    if session.is_invalid:\n        return invalid_text_write_commit(session, project_id)\n    return second_call(session, project_id)\n\ndef invalid_text_write_commit( self, session: EditSession, project_id: str ) -> SuccessResult | ErrorResult:\n    try:\n        draft_text = session.draft_path.read_text(encoding=\"utf-8\")\n    except\
  \ OSError as exc:\n        return error_result_from_make_error(\n            make_error(WRITE_FAILED, f\"Cannot read draft: {exc}\")\n        )\n    ok, parse_errors = validate_invalid_session_for_commit(session, draft_text)\n    if not ok:\n        return error_result_from_make_error(\n            make_error(\n                FORMAT_INVALID_ON_OPEN,\n                \"File still has parse errors; write blocked. Fix errors and retry.\",\n                details={\"parse_errors\": parse_errors},\n            )\n        )\n    result = second_call(session, project_id)\n    if not isinstance(result, SuccessResult):\n        return result\n    try:\n        recovered = restore_session_format_after_recovery(session, project_id)\n    except Exception as exc:\n        return error_result_from_make_error(\n            make_error(\n                WRITE_FAILED,\n                f\"Write succeeded but format recovery failed: {exc}\",\n            )\n        )\n    payload = dict(result.data)\n \
  \   payload.update(recovered)\n    payload[\"is_invalid\"] = False\n    payload[\"mode_notice\"] = mode_notice_text(False)\n    return SuccessResult(data=payload)\n\ndef sidecar_preview(session: EditSession) -> SuccessResult | ErrorResult:\n    try:\n        code = generate_code(session)\n    except Exception as exc:\n        return error_result_from_make_error(\n            make_error(WRITE_FAILED, f\"Preview generation failed: {exc}\")\n        )\n    original = session.abs_path.read_text(encoding=\"utf-8\")\n    diff = unified_diff_text(\n        original,\n        code,\n        before_label=str(session.abs_path),\n        after_label=str(session.abs_path),\n    )\n    return SuccessResult(\n        data={\n            \"success\": True,\n            \"phase\": \"preview\",\n            \"write_mode\": \"preview\",\n            \"diff\": diff,\n        }\n    )\n\ndef first_call( self, session: EditSession, current_pid: int ) -> SuccessResult | ErrorResult:\n    code = generate_code(session)\n\
  \    original = session.abs_path.read_text()\n    diff = unified_diff_text(\n        original,\n        code,\n        before_label=str(session.abs_path),\n        after_label=str(session.abs_path),\n    )\n    write_lockfile_pid(\n        session.abs_path,\n        current_pid,\n        session.session_id,\n        write_preview_ready=True,\n    )\n    return SuccessResult(data={\"success\": True, \"phase\": \"preview\", \"diff\": diff})\n\ndef second_call( self, session: EditSession, _project_id: str ) -> SuccessResult | ErrorResult:\n    _ = _project_id\n    fp_parts = Path(session.file_path).parts\n    root_dir = session.abs_path.parents[len(fp_parts) - 1]\n    rel = session.abs_path.relative_to(root_dir)\n    rel_str = str(rel)\n    bm = BackupManager(root_dir)\n    bm.create_backup(session.abs_path, command=\"universal_file_write\")\n    original_content = session.abs_path.read_text()\n    try:\n        code = generate_code(session)\n    except Exception as exc:\n        bm.restore_file(rel_str)\n\
  \        return error_result_from_make_error(\n            make_error(WRITE_FAILED, f\"Code generation failed: {exc}\")\n        )\n    tmp_path: Optional[str] = None\n    try:\n        with tempfile.NamedTemporaryFile(\n            mode=\"w\",\n            suffix=session.abs_path.suffix,\n            dir=str(session.abs_path.parent),\n            delete=False,\n            encoding=\"utf-8\",\n        ) as tmp:\n            tmp.write(code)\n            tmp_path = tmp.name\n        os.replace(tmp_path, str(session.abs_path))\n    except OSError as exc:\n        bm.restore_file(rel_str)\n        if tmp_path:\n            Path(tmp_path).unlink(missing_ok=True)\n        return error_result_from_make_error(\n            make_error(WRITE_FAILED, f\"Write failed: {exc}\")\n        )\n\n    if session.format_group == FORMAT_SIDECAR and session.tree_id:\n        from ai_editor.core.cst_tree.tree_builder import (\n            get_tree as get_cst_tree,\n        )\n        from ai_editor.core.cst_tree.tree_sidecar\
  \ import (\n            write_sidecar_atomic,\n        )\n\n        tree = get_cst_tree(session.tree_id)\n        if tree is not None:\n            write_sidecar_atomic(session.abs_path, tree)\n\n    delete_lockfile(session.abs_path)\n    diff = unified_diff_text(\n        original_content,\n        code,\n        before_label=str(session.abs_path),\n        after_label=str(session.abs_path),\n    )\n    if not session.is_invalid:\n        try_clear_invalid_after_write(session)\n    try:\n        commit_after_write(\n            root_dir,\n            [rel],\n            command_name=\"universal_file_write\",\n            config_data={},\n        )\n    except Exception:\n        pass\n    return SuccessResult(\n        data={\n            \"success\": True,\n            \"phase\": \"committed\",\n            \"write_mode\": \"commit\",\n            \"diff\": diff,\n            \"is_invalid\": session.is_invalid,\n            \"mode_notice\": mode_notice_text(\n                session.is_invalid,\
  \ session.fallback_reason\n            ),\n        }\n    )\n```\n\nModule-level phase helpers imported by write_command_runtime as phases.\n"
