step_id: T-000
parent_global_step: G-007
name: Соответствие лимиту 400 строк command-модулей
description: 'Инфраструктурный тактический шаг: структурное разбиение oversized command-модулей семейств open, write и preview в составе MCP Workflow Surface (C-016) на пары facade+runtime так, чтобы каждый результирующий модуль соблюдал плановый лимит 400 строк, без изменения поведения команд. Facade-модули остаются точкой регистрации MCP-команды; execute и вспомогательная логика переносятся в sibling runtime- и auxiliary-модули:

  - семейство open: open_command → open_command_runtime (+ вспомогательный open_command_draft);
  - семейство write: write_command → write_command_runtime (+ вспомогательный write_command_phases);
  - семейство preview: universal_file_preview_command → universal_file_preview_runtime.

  Инвариант: раскладка модулей (Edit Subdirectory C-008, стадии Edit и Write C-011/C-012, Internal Edit Engine C-019) меняется только структурно; семантика и контракты команд неизменны.

  Граница scope: только структурное разбиение command-модулей; поведенческая интеграция Session Guard и политики broken session в команды open/edit/preview — вне scope этого шага.

  '
