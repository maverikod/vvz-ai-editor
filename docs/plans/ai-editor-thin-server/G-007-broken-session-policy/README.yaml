step_id: G-007
name: Broken session policy
description: 'Реализовать Session Guard (C-024) как внутреннюю сущность AI Editor Server (C-001), не экспонируемую на MCP. Session Guard — единая точка Session Validation (C-014) через Upstream Client (C-017): перед normal-операциями (Open Stage C-010, Edit Stage C-011, read-only preview внутри открытой CA Session C-004) проверять валидность session_id на СА; при отсутствии или невалидности — отказ с SESSION_NOT_FOUND.

  Broken Session Policy (C-015): когда CA Session на СА отсутствует или признана невалидной, редактор отклоняет все normal-операции (открытие нового файла, правки, preview), но допускает terminating-операции Write Stage (C-012) и Close Stage (C-013). Write — best-effort попытка сохранить локальный draft на СА; при NOT_FOUND ответ с ошибкой СА, draft сохраняется. Close — best-effort unlock на СА и освобождение локальных ресурсов.

  При подтверждённом отсутствии сессии на СА Workspace Session Cleanup (C-025) удаляет Editor Session Directory (C-005) и связанные in-memory метаданные (зомби-каталоги). Session Guard классифицирует операции normal vs terminating и делегирует cleanup C-025.

  '
