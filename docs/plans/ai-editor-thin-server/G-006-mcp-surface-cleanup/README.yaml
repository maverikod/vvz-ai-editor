step_id: G-006
name: Сужение MCP-поверхности
description: 'Снять с публичной MCP-поверхности редактора дублирующие и устаревшие семейства команд в объёме Legacy Removal Scope (C-020), чтобы MCP Workflow Surface (C-016) содержала только целевой файловый workflow (C-009) и инфраструктурную команду health — без фоновых queue-команд и без выноса upstream-вызовов в отдельный MCP API для модели. Доступ к Code Analysis Server сохраняется исключительно внутри workflow-команд через Upstream Client (C-017). Итоговое соответствие проверяется по Product Acceptance Criteria (C-022). Модули устаревшего кода могут временно сохраняться для внутреннего переиспользования до шага G-009.

  '
