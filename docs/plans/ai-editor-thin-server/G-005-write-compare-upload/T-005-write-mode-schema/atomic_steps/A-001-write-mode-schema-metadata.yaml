  ## Required metadata updates

  Replace `detailed_description` with C-012 thin-server text:

  ```
  Write Stage (C-012) for files open in a CA session workspace.

  write_mode=preview:
    Canonical-export comparison (format-specific export vs Origin Snapshot bytes).
    Returns local unified diff only. No upload to Code Analysis Server.

  write_mode=commit:
    compare_session_to_origin; if equal — success no-op (unchanged=true, no CA RPC).
    If diff — upload canonical export via Upstream Client; on CA success refresh
    workspace Origin Snapshot with accepted bytes. On CA error — local origin and
    draft unchanged.

  session_id is the CA session id (same id passed to all universal_file_* commands).

  In-session sidecar lockfile (legacy two-phase preview) is a local preview aid only;
  it is NOT a gate for CA upload RPC.
  ```

  Update `parameters.session_id.description`:
  `"CA session id from session_create on Code Analysis Server; required on every universal_file_* call."`

  Update `parameters.write_mode`:
  - `description`: `"preview: local diff via canonical-export comparison, no CA upload. commit: compare-and-upload to CA when content differs."`
  - `default`: `"commit"` (match get_schema on UniversalFileWriteCommand)
  - Remove "Omitted on sidecar: two-phase PID lockfile" as primary commit path.

  Add `parameters.file_path` entry:
  ```python
  "file_path": {
      "description": "Project-relative path; required when session holds multiple open files.",
      "type": "string",
      "required": True,
  },
  ```

  Update `return_value.success.data` to include:
  - `"unchanged": "True when commit found no diff vs origin (no CA upload)."`
  - `"uploaded": "True when commit uploaded to CA and origin snapshot refreshed."`

  Replace `usage_examples` with two examples:
  1. preview — write_mode=preview, explanation: local diff only
  2. commit no-op — write_mode=commit when unchanged, explanation: unchanged=true, no upload

  Add error case `UPSTREAM_UPLOAD_FAILED`:
  `"description": "CA rejected upload; origin and draft unchanged."`

  Replace `best_practices` — remove lockfile-gate and local-disk-commit guidance; add:
  - "Call write_mode=preview before commit to inspect diff."
  - "write_mode=commit with equal content returns unchanged=true without CA RPC."
  - "On upload failure, retry write or call universal_file_close."

  ## Forbidden

  - Do NOT state lockfile is required for CA upload.
  - Do NOT describe commit as local os.replace to project root.
  - Do NOT modify write_command.py in this step.
  - Do NOT contradict get_schema enum values for write_mode.

