prompt: |
  Modify `ai_editor/commands/universal_file_edit/write_command_metadata.py` only.
  Align metadata with C-012 thin-server write_mode semantics. Scrub lockfile-as-upload-gate
  language; document compare-and-upload via canonical export.

  ## MRS C-012 (embed for documentation)

  - write_mode preview — локальный diff; commit — compare-and-upload
  - in-session lockfile не gate для RPC к СА
  - сравнение — format-specific export (sidecar, tree-temp, text) vs origin bytes
  - при равенстве — no-op без вызова СА; при отличии — upload; при успехе — перезапись Origin Snapshot

  ## CURRENT FILE CONTENT (modify this file)

