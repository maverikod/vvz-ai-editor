  class CompareResult(str, Enum):
      EQUAL = "equal"
      DIFF = "diff"

  @dataclass(frozen=True)
  class WriteComparison:
      result: CompareResult
      origin_bytes: bytes
      exported_bytes: bytes

  def compare_session_to_origin(session: EditSession) -> WriteComparison:
      """
      Read origin_bytes = session.abs_path.read_bytes().
      Compute exported_bytes via format-specific canonical export:
        FORMAT_SIDECAR: get_cst_tree + strip_inline_node_id_lines_from_source → utf-8
        FORMAT_TREE_TEMP: serialize_tree_temp_session_source → utf-8
        else: session.draft_path.read_text(encoding=utf-8) → utf-8
      Return WriteComparison with EQUAL if bytes match else DIFF.
      """
  ```

