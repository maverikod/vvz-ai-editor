step_id: G-005
name: Write compare-and-upload
description: 'Реализовать Write Stage (C-012): перед любым RPC к СА экспортировать текущее состояние Edit Subdirectory (C-008) в каноническую сериализованную форму и сравнивать этот канонический экспорт побайтово с байтами Origin Snapshot (C-007) как baseline origin.

  write_mode=preview: сформировать только локальный diff (результат сравнения канонического экспорта с origin baseline); upload на СА не выполняется.

  write_mode=commit: compare-and-upload — при равенстве канонического экспорта и origin baseline успешный no-op без вызова СА; при отличии — отправка через Upstream Client (C-017) по контракту C-023; при успехе СА — перезапись Origin Snapshot (C-007) принятым содержимым. При ошибке СА локальное состояние (Origin Snapshot и Edit Subdirectory) не меняется. Изменение содержимого файла на СА — только через upload API; прямая запись в дерево проекта на диске СА запрещена.

  '
