  Create `ai_editor/commands/universal_file_edit/write_compare.py` (operation: create_file).
  Pure comparison module — no MCP, no upstream RPC.

  ## MRS C-012 Write Stage (embed verbatim for coder)

  - сравнение — format-specific export (sidecar, tree-temp, text) vs origin bytes
  - write_mode preview — локальный diff; commit — compare-and-upload
  - in-session lockfile не gate для RPC к СА
  - при равенстве — no-op без вызова СА; при отличии — upload; при успехе — перезапись Origin Snapshot; при ошибке — локальное состояние не меняется

  ## Canonical-export comparison rule (C-012)

  Export current edit state to canonical serialized form; byte-for-byte compare against
  Origin Snapshot baseline (`session.abs_path.read_bytes()`). NOT raw in-place byte compare
  of draft/sidecar artifacts.

  ## Per-format export algorithm (exact)

  | format_group constant | export steps |
  |-----------------------|--------------|
  | `FORMAT_SIDECAR` | `get_tree(session.tree_id)` → `strip_inline_node_id_lines_from_source(str(tree.module.code))` → `.encode("utf-8")` |
  | `FORMAT_TREE_TEMP` | `serialize_tree_temp_session_source(session)` → `.encode("utf-8")` |
  | `FORMAT_TEXT` (and any other) | `session.draft_path.read_text(encoding="utf-8")` → `.encode("utf-8")` |
  | origin baseline | `session.abs_path.read_bytes()` — never from draft |

