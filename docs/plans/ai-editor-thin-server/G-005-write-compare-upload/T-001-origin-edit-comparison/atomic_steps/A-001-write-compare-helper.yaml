  ## Types and public API (exact signatures)

  ```python
  class CompareResult(str, Enum):
      EQUAL = "equal"
      DIFF = "diff"

  @dataclass(frozen=True)
  class WriteComparison:
      result: CompareResult
      origin_bytes: bytes
      exported_bytes: bytes

  def _export_canonical_bytes(session: EditSession) -> bytes:
      """Format-specific canonical export of Edit Subdirectory state."""

  def compare_session_to_origin(session: EditSession) -> WriteComparison:
      """Byte-compare canonical export vs Origin Snapshot."""
  ```

  ## Method: `_export_canonical_bytes(session: EditSession) -> bytes`

  Algorithm:
  1. Read `fg = session.format_group`.
  2. If `fg == FORMAT_SIDECAR`:
     a. If `not session.tree_id`: raise `ValueError("Session has no tree_id for sidecar export")`.
     b. `tree = get_cst_tree(session.tree_id)`.
     c. If `tree is None`: raise `ValueError(f"CST tree {session.tree_id!r} not found")`.
     d. `code = strip_inline_node_id_lines_from_source(str(tree.module.code))`.
     e. Return `code.encode("utf-8")`.
  3. If `fg == FORMAT_TREE_TEMP`:
     a. `text = serialize_tree_temp_session_source(session)`.
     b. Return `text.encode("utf-8")`.
  4. Else (FORMAT_TEXT and fallback):
     a. Return `session.draft_path.read_text(encoding="utf-8").encode("utf-8")`.

  Error handling:
  - Raise `ValueError` with messages above for missing tree_id or missing CST tree.
  - Let `OSError` from `read_text` propagate unchanged.

  Edge cases:
  - Empty draft text → return `b""` (valid export).
  - Empty origin → comparison handled by caller via byte equality.

  ## Method: `compare_session_to_origin(session: EditSession) -> WriteComparison`

  Algorithm:
  1. `origin_bytes = session.abs_path.read_bytes()`.
  2. `exported_bytes = _export_canonical_bytes(session)`.
  3. If `exported_bytes == origin_bytes`: `result = CompareResult.EQUAL`.
  4. Else: `result = CompareResult.DIFF`.
  5. Return `WriteComparison(result=result, origin_bytes=origin_bytes, exported_bytes=exported_bytes)`.

  Error handling:
  - Propagate `ValueError` from `_export_canonical_bytes`.
  - Propagate `OSError` from `read_bytes` / `read_text`.

  ## Reference implementation skeleton (translate line-by-line)

  ```python
  def _export_canonical_bytes(session: EditSession) -> bytes:
      fg = session.format_group
      if fg == FORMAT_SIDECAR:
          from ai_editor.core.cst_tree.tree_builder import get_tree as get_cst_tree
          from ai_editor.core.cst_tree.node_stable_id import (
              strip_inline_node_id_lines_from_source,
          )
          if not session.tree_id:
              raise ValueError("Session has no tree_id for sidecar export")
          tree = get_cst_tree(session.tree_id)
          if tree is None:
              raise ValueError(f"CST tree {session.tree_id!r} not found")
          code = strip_inline_node_id_lines_from_source(str(tree.module.code))
          return code.encode("utf-8")
      if fg == FORMAT_TREE_TEMP:
          from ai_editor.commands.universal_file_edit.tree_temp_write_commit import (
              serialize_tree_temp_session_source,
          )
          return serialize_tree_temp_session_source(session).encode("utf-8")
      return session.draft_path.read_text(encoding="utf-8").encode("utf-8")

  def compare_session_to_origin(session: EditSession) -> WriteComparison:
      origin_bytes = session.abs_path.read_bytes()
      exported_bytes = _export_canonical_bytes(session)
      result = (
          CompareResult.EQUAL
          if exported_bytes == origin_bytes
          else CompareResult.DIFF
      )
      return WriteComparison(
          result=result,
          origin_bytes=origin_bytes,
          exported_bytes=exported_bytes,
      )
  ```

