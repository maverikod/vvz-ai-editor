  async def write(
      self,
      project_id: str,
      session_id: str,
      *,
      file_path: Optional[str] = None,
      write_mode: str = "commit",
  ) -> Dict[str, Any]:
      """Run write stage (C-009) via universal_file_write (C-016)."""

  async def close(
      self,
      project_id: str,
      session_id: str,
      *,
      file_path: Optional[str] = None,
  ) -> Dict[str, Any]:
      """Run close stage (C-009) via universal_file_close (C-016)."""

  async def preview(
      self,
      project_id: str,
      file_path: str,
      session_id: str,
      **kwargs: Any,
  ) -> Dict[str, Any]:
      """Read-only preview via universal_file_preview (C-016)."""
  ```

  ## Algorithms

  **Class docstring**: state that `session_id` is the CA Session id (C-004) supplied by the agent (C-003) before any workflow call; it is **not** generated by `open` and is **not** the legacy client `session_*` API.

  **`open`**: build `params` with `project_id`, `file_path`, `session_id` (always), `create`; add `initial_content` when not None; call `call_validated("universal_file_open", params)`; return `unwrap_command_result(...)`.

  **`edit`**: build params with `project_id`, `session_id`, `operations`; include `file_path` key only when `file_path is not None`; call `universal_file_edit`.

  **`write`**: build params with `project_id`, `session_id`, `write_mode`; include `file_path` when `file_path is not None`; call `universal_file_write`.

  **`close`**: build params with `project_id`, `session_id`; include `file_path` when `file_path is not None`; call `universal_file_close`.

  **`preview`**: build params with `project_id`, `file_path`, `session_id`; `params.update(kwargs)`; call `universal_file_preview`.

  Parameter names must match MCP schemas (C-016) exactly. No optional group-session id.

  ## Forbidden

  - Do NOT modify files other than `client/ai_editor_client/universal_file.py`.
  - Do NOT make `session_id` optional on any workflow method.
  - Do NOT document or accept editor group UUID as session key.
  - Do NOT add methods beyond the five listed.

