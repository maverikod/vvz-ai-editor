  CURRENT FILE CONTENT (`client/ai_editor_client/universal_file.py`):
  ```py
  """
  Universal file edit-session workflow on top of :class:`CodeAnalysisAsyncClient`.

  Wraps ``universal_file_open`` / ``edit`` / ``write`` / ``close`` / ``preview`` only.
  Legacy ``universal_file_read`` / ``universal_file_save`` and CST commands are not
  part of this API (see :mod:`server_api`).

  Author: Vasiliy Zdanovskiy
  email: vasilyvz@gmail.com
  """

  from __future__ import annotations

  from typing import TYPE_CHECKING, Any, Dict, List, Optional

  from ai_editor_client.responses import unwrap_command_result

  if TYPE_CHECKING:
      from ai_editor_client.client import CodeAnalysisAsyncClient


  class UniversalFileClient:
      """Edit-session workflow for project files (open → edit → write → close).

      Uses ``session_id`` from ``universal_file_open`` only. Not related to
      client ``session_*`` commands (``session_create``, ``session_open_file``, …).
      """

      __slots__ = ("_client",)

      def __init__(self, client: CodeAnalysisAsyncClient) -> None:
          self._client = client

      async def open(
          self,
          project_id: str,
          file_path: str,
          *,
          create: bool = False,
          initial_content: Optional[str] = None,
      ) -> Dict[str, Any]:
          """Start an edit session (``universal_file_open``).

          Identifies the file by ``project_id`` + ``file_path`` (not ``file_id``).
          """
          params: Dict[str, Any] = {
              "project_id": project_id,
              "file_path": file_path,
              "create": create,
          }
          if initial_content is not None:
              params["initial_content"] = initial_content
          return unwrap_command_result(
              await self._client.call_validated("universal_file_open", params)
          )

      async def edit(
          self,
          project_id: str,
          session_id: str,
          operations: List[Dict[str, Any]],
      ) -> Dict[str, Any]:
          """Apply draft mutations (``universal_file_edit``)."""
          return unwrap_command_result(
              await self._client.call_validated(
                  "universal_file_edit",
                  {
                      "project_id": project_id,
                      "session_id": session_id,
                      "operations": operations,
                  },
              )
          )

      async def write(
          self,
          project_id: str,
          session_id: str,
          *,
          write_mode: str = "commit",
      ) -> Dict[str, Any]:
          """Persist or preview draft (``universal_file_write``).

          Default ``write_mode`` is ``commit`` in this client wrapper. The server
          default when the parameter is omitted is ``preview``. Pass
          ``write_mode='preview'`` first to inspect the diff, then ``commit``.
          """
          return unwrap_command_result(
              await self._client.call_validated(
                  "universal_file_write",
                  {
                      "project_id": project_id,
                      "session_id": session_id,
                      "write_mode": write_mode,
                  },
              )
          )

      async def close(
          self,
          project_id: str,
          session_id: str,
      ) -> Dict[str, Any]:
          """End edit session (``universal_file_open`` session_id, not client ``session_*``)."""
          return unwrap_command_result(
              await self._client.call_validated(
                  "universal_file_close",
                  {
                      "project_id": project_id,
                      "session_id": session_id,
                  },
              )
          )

      async def preview(
          self,
          project_id: str,
          file_path: str,
          **kwargs: Any,
      ) -> Dict[str, Any]:
          """Structured read-only preview (``universal_file_preview``)."""
          params: Dict[str, Any] = {
              "project_id": project_id,
              "file_path": file_path,
          }
          params.update(kwargs)
          return unwrap_command_result(
              await self._client.call_validated("universal_file_preview", params)
          )
  ```

  Modify `client/ai_editor_client/universal_file.py` only.

  ## MRS excerpt

  - **C-003 Agent Model**: agent creates CA session on upstream; passes the same `session_id` into every editor command; decides write/close.
  - **C-004 CA Session**: `session_id` is the CA session identifier; mandatory context for all file work; sole session key in `universal_file_*` (no editor group UUID).
  - **C-009 File Workflow**: mandatory cycle open → edit → write → close per file within one CA Session.
  - **C-016 MCP Workflow Surface**: public commands are `universal_file_open`, `universal_file_edit`, `universal_file_write`, `universal_file_close`, `universal_file_preview` only.

  ## Required method signatures (after change)

  ```py
