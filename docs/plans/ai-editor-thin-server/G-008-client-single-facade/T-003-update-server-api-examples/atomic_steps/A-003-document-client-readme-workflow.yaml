  ### 1. Add new section `## File Workflow (C-009)` immediately after `## Validation using the server schema`

  Insert a dedicated section documenting the four-stage workflow. Required substructure:

  **Heading:** `## File Workflow (C-009)`

  **Intro paragraph (exact meaning, prose may vary slightly but must cover all points):**
  - Thin AI Editor Server exposes file editing only through `UniversalFileClient` (`client.universal_files`).
  - One file at a time follows: **open → edit → write → close**.
  - Optional read-only inspection during an open file uses `preview` (`universal_file_preview`).
  - Every stage requires the same CA Session `session_id`, `project_id`, and (where applicable) `file_path`.

  **Subheading:** `### Workflow stages`

  Numbered list (exact stage names and server commands):

  1. **Open** (`universal_file_open`) — agent supplies CA `session_id`; server locks file on upstream CA, creates local Editor Session Directory and File Subtree, stores Origin Snapshot, creates Edit Subdirectory. Use `create=True` with `initial_content` for new files.
  2. **Edit** (`universal_file_edit`) — mutations apply only to the Edit Subdirectory; Origin Snapshot unchanged.
  3. **Write** (`universal_file_write`) — compares Origin Snapshot to edited content; `write_mode="preview"` returns local diff without upstream upload; commit mode uploads to CA on change and refreshes Origin Snapshot on success.
  4. **Close** (`universal_file_close`) — unlocks file on CA, removes local File Subtree; removes Editor Session Directory when last file in session closes.

  **Subheading:** `### Minimal async example`

  Provide a fenced Python code block demonstrating the workflow with `ai_editor_client` imports (match sibling examples, not legacy `code_analysis_client` if the code block is new). The example must:

  - Obtain `ca_session_id` **before** any `universal_file_*` call (comment: created upstream via CA `session_create`, outside this client package).
  - Pass the same `ca_session_id` to `uf.open(...)`, `uf.preview(...)`, `uf.edit(...)`, `uf.write(...)`, `uf.close(...)`.
  - **Not** assign `session_id` from the `open` response for subsequent calls.
  - Use `write_mode="preview"` in the sample unless showing commit explicitly.
  - End with pointer: full runnable script — `client/examples/ex_universal_files.py`.

  ### 2. Add new section `### CA Session ID contract (C-003)` inside the File Workflow section (after Minimal async example)

  **Heading:** `### CA Session ID contract (C-003)`

  Bulleted rules (all required):

  - The **agent** creates the CA Session on Code Analysis Server (`session_create`) **before** calling any editor `universal_file_*` command. That RPC is **not** part of the thin editor MCP surface and is **not** wrapped by `UniversalFileClient`.
  - The agent passes the **same** `session_id` string to every `universal_file_open`, `universal_file_edit`, `universal_file_write`, `universal_file_close`, and `universal_file_preview` call for the workflow.
  - Do **not** treat the `open` response as the source of `session_id` for later calls. If the server echoes `session_id`, it must match the agent-supplied value; the agent already owns the identifier.
  - The agent decides when to `write` (commit or preview) and `close`; the client library does not manage CA session lifecycle.

