  ## MRS excerpt (concepts for this step only)

  - **C-003 Agent Model**: модель-агент управляет жизненным циклом сессии СА и последовательностью вызовов; создаёт и закрывает сессию на СА; передаёт `session_id` во **все** команды редактора; решает о write/close.
  - **C-009 File Workflow**: обязательный четырёхстадийный цикл open → edit → write → close для одного файла в контексте CA Session; реализуется командами `universal_file_open`, `universal_file_edit`, `universal_file_write`, `universal_file_close`; блокировка/разблокировка — через СА; локальные артефакты — только в Editor Session Directory.
  - **C-016 MCP Workflow Surface**: единственный публичный MCP-контракт редактора для файлового workflow и health — `universal_file_open`, `universal_file_edit`, `universal_file_write`, `universal_file_close`, `universal_file_preview`, плюс `health` только; `queue_health` не регистрируется; дублирующие семейства команд запрещены; вызовы СА не экспонируются модели отдельно.
  - **C-022 Product Acceptance Criteria** (релевантно README): `help` без дублирующих семейств команд; клиентский контракт согласован со суженной MCP-поверхностью (C-016).

  ## Authoritative server_api constants (for README command tables)

  The module `ai_editor_client.server_api` defines:

  - `UNIVERSAL_FILE_COMMANDS`: `universal_file_open`, `universal_file_edit`, `universal_file_write`, `universal_file_close`, `universal_file_preview`
  - `INFRASTRUCTURE_COMMANDS`: `health` only
  - `CLIENT_FACADE_COMMANDS`: `UNIVERSAL_FILE_COMMANDS | INFRASTRUCTURE_COMMANDS` — **the supported thin-server public surface**
  - `DEPRECATED_CLIENT_FACADE_COMMANDS`: `FILE_SESSION_COMMANDS | TRANSFER_AND_LOCK_COMMANDS` — legacy client modules only; **not registered on thin AI Editor Server**
  - `REMOVED_COMMANDS`: includes legacy file I/O, CST commands, and `DEPRECATED_CLIENT_FACADE_COMMANDS`
  - Facade property for file workflow: `client.universal_files` (`UniversalFileClient`)

  README must document `CLIENT_FACADE_COMMANDS` as the supported set and mark `file_sessions` / transfer families as deprecated (C-022 / C-020 legacy scope).

  ## Problem statement

  The current README still presents `client.file_sessions` (session_*, subordinate_session_*, project_file_transfer_*) as a **peer** facade alongside `client.universal_files`. That contradicts C-016 thin MCP surface. This step closes the T-003 a10 coverage gap: document the unified File Workflow (C-009) and agent-supplied CA `session_id` contract (C-003) in the client library README.

  ## CURRENT FILE CONTENT (`client/README.md`)

  ```markdown
  # code-analysis-client

  Async Python client for the **code-analysis** server. It wraps `mcp-proxy-adapter`'s `JsonRpcClient`, so you get the adapter's built-in methods (queue, transfer, `help`, `health`, …) plus thin helpers to run any registered server command.

  ## Install

  ```bash
  pip install code-analysis-client
  ```

  ## Usage

  ```python
  import asyncio
  from code_analysis_client import CodeAnalysisAsyncClient


  async def main() -> None:
      client = CodeAnalysisAsyncClient(
          protocol="https",
          host="127.0.0.1",
          port=15001,
          cert="/path/client.crt",
          key="/path/client.key",
          ca="/path/ca.crt",
          timeout=120.0,
      )
      async with client:
          h = await client.rpc.help()
          r = await client.call("list_projects", {"include_deleted": False})
      print(h, r)


  asyncio.run(main())
  ```

  Build client settings from the same JSON shape as the pipeline adapter settings (`host`, `port`, `protocol`, optional `ssl` with `cert` / `key` / `ca` or `*_path` aliases), or from a full server `config.json` object.

  ```python
  from code_analysis_client import CodeAnalysisAsyncClient

  client = CodeAnalysisAsyncClient.from_server_config(config_dict, timeout=60.0)
  ```

  Queued/long commands: use `client.call_unified(..., expect_queue=True, auto_poll=True)` or the underlying `client.rpc.execute_command_unified(...)`.

  ## Validation using the server schema

  The authoritative input schema is whatever the running server returns from **`help`** with `cmdname` set to the command. The client calls that, optionally caches the result, performs the same shallow checks as the server's `BaseMCPCommand` (types, `required`, `enum`, `additionalProperties`), then runs the command.

  ```python
  async with CodeAnalysisAsyncClient(host="127.0.0.1", port=15001) as client:
      # Explicit
      out = await client.call_validated(
          "list_projects",
          {"include_deleted": False},
      )
      # Dynamic wrapper: same as call_validated("list_projects", {...})
      out = await client.commands.list_projects(include_deleted=False)
      # After server reload
      client.clear_command_schema_cache()
  ```

  Use `call_unified_validated` when you need queue polling. Pass `refresh_schema=True` on a single call to bypass the in-memory schema cache.

  ## High-level facades (aligned with live server registry)

  The client does **not** wrap CST commands (`cst_load_file`, …) or legacy file I/O
  (`universal_file_read`, `read_project_text_file`, …). Those commands are removed
  from the server registry. Use the facades below or generic `call` / `commands.*`.

  | Facade | Property | Server commands |
  |--------|----------|-----------------|
  | Client DB sessions + transfer | `client.file_sessions` | `session_*`, `subordinate_session_*`, `project_file_transfer_*`, `project_file_advisory_lock_batch` |
  | Universal edit sessions | `client.universal_files` | `universal_file_open`, `edit`, `write`, `close`, `preview` |
  | Any registered command | `client.call` / `client.commands.<name>` | schema from live `help()` |

  Canonical command lists: `code_analysis_client.server_api` — exported as
  `FILE_SESSION_COMMANDS`, `FILE_SESSION_FACADE_METHODS`, `CLIENT_FACADE_COMMANDS`,
  `REMOVED_COMMANDS`.

  Sync checks (in-process registry):

  ```bash
  pytest tests/test_client_server_api_sync.py tests/test_code_analysis_client.py -k session
  ```

  Package version is in ``client/code_analysis_client/version.txt`` (synced with the
  root ``code-analysis`` project via ``scripts/sync_code_analysis_client_version.py``).

