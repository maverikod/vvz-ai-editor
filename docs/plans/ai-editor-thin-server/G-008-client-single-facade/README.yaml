step_id: G-008
name: Единый клиентский фасад
description: 'Свести клиентскую библиотеку к одному публичному фасаду, реализующему File Workflow (C-009) поверх MCP Workflow Surface (C-016): обязательный контекст CA Session (C-004) — session_id, project_id и file_path на стадиях open, write и close — в согласовании с моделью агента (C-003). Параллельные и дублирующие клиентские фасады пометить deprecated или убрать из публичного API в объёме Legacy Removal Scope (C-020), критерий {4z1r}. Согласовать регистрацию команд, примеры и проверки соответствия со суженной MCP-поверхностью (C-016); итог — по Product Acceptance Criteria (C-022).

  '
