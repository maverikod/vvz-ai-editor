  Modify `client/ai_editor_client/__init__.py` only.

  **Prerequisite** (file state before this step): `client/ai_editor_client/client.py` already emits `DeprecationWarning` when `CodeAnalysisAsyncClient` deprecated facade properties (`file_sessions`, `editor_files`) are accessed, per **C-020 Legacy Removal Scope**. This step adds deprecation warnings for deprecated symbols exported from `__init__.py`.

  ## MRS excerpt

  - **C-020 Legacy Removal Scope**: duplicate client facades are deprecated before physical removal.
  - **C-016 MCP Workflow Surface**: `UniversalFileClient` and `CodeAnalysisAsyncClient.universal_files` are the supported public API.

  ## Task

  1. Add `import warnings` at top (after `from __future__ import annotations`).

  2. Add module-level `_DEPRECATED_EXPORTS: frozenset[str] = frozenset({"FileSessionClient", "EditorFileClient", "EditorFileHandle", "LocalEditWorkspace"})`.

  3. Add function `_emit_deprecated_export_warning(class_name: str) -> None` that calls `warnings.warn(f"{class_name} export is deprecated; use UniversalFileClient via CodeAnalysisAsyncClient.universal_files (C-016). Removal under C-020.", DeprecationWarning, stacklevel=3)`.

  4. Wrap deprecated class imports with thin factory aliases that warn on **instantiation**:
     - Keep direct imports of `EditorFileClient`, `FileSessionClient`, `LocalEditWorkspace`, `EditorFileHandle` for type identity.
     - For each deprecated class `Cls`, define `def _deprecated_Cls(*args: Any, **kwargs: Any) -> Cls:` that calls `_emit_deprecated_export_warning("Cls")` then `return Cls(*args, **kwargs)`.
     - Re-bind public name only if needed for `__all__` — preferred approach: leave classes in `__all__` but document in module docstring that `UniversalFileClient` is primary; emit warning from a new `__getattr__` on the package module is **forbidden** (use explicit wrapper subclasses instead).

     **Prescribed approach (no `__getattr__`)**: create wrapper subclasses:
     ```py
     class _DeprecatedFileSessionClient(FileSessionClient):
         def __init__(self, *args: Any, **kwargs: Any) -> None:
             _emit_deprecated_export_warning("FileSessionClient")
             super().__init__(*args, **kwargs)
     ```
     Repeat for `EditorFileClient`, `LocalEditWorkspace`. For `EditorFileHandle`, subclass and warn in `__init__`.
     Re-export wrapped names as `FileSessionClient = _DeprecatedFileSessionClient` etc. so existing `from ai_editor_client import FileSessionClient` still works but warns.

  5. Add `from typing import Any` import for wrapper `__init__` signatures.

  6. Update module docstring: state `UniversalFileClient` is the single supported file-workflow facade (C-016); `FileSessionClient` / `EditorFileClient` / `LocalEditWorkspace` are deprecated (C-020).

  7. Keep `__all__` list unchanged (names stay exported for one minor version).

  ## Forbidden

  - Do NOT remove symbols from `__all__` in this step.
  - Do NOT modify `client.py` in this step.
  - Do NOT use module-level `__getattr__` lazy deprecation.

