step_id: G-004
name: Адаптация edit и preview к workspace
description: 'Сохранить семантику Internal Edit Engine (C-019) без изменения внутренней модели операций редактирования. Перевести Edit Stage (C-011) на работу исключительно внутри Edit Subdirectory (C-008) в пределах File Subtree: все привязки рабочей копии и вспомогательные артефакты редактирования размещаются относительно Edit Subdirectory, а не канонического пути проекта на upstream-сервере. Edit и preview не изменяют Origin Snapshot. Preview остаётся единственной read-only командой просмотра открытой рабочей копии. Семантика пакетного edit и операций, зависящих от формата файла, не меняется — обновляются только workspace-relative пути и поиск контекста по идентификатору CA Session.

  '
