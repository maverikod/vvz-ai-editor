  ## Deterministic patches (apply all inside `get_universal_file_preview_metadata`)

  ### 1. `detailed_description` — append after existing "Edit session integration" paragraph

  Append this exact prose block (preserve leading newlines inside the string):

  ```
  One-shot preview (file not open in workspace):
    When no editor bundle exists for (project_id, file_path), preview downloads file bytes from
    Code Analysis Server via Upstream Client download_without_lock (C-023) without session_open_file
    or CA lock. Content is previewed from a temporary in-memory/ephemeral file; no File Subtree is
    created and no bundle registry entry is written. Optional session_id performs SessionGuard
    PREVIEW touch only; it does not switch to workspace draft mode.
    When the file is already open in the editor workspace, one-shot mode is rejected with
    OPEN_FILE_USE_WORKSPACE_PREVIEW — pass session_id (CA id from universal_file_open) to preview
    the workspace Edit Subdirectory draft instead (open-file preview mode, G-004/T-002).
  ```

  ### 2. `parameters.session_id` — replace `description` value

  ```
  Optional CA session id. On one-shot preview (file not open): performs SessionGuard PREVIEW
  validation when provided; does not read workspace draft. On open-file preview (file already
  open in workspace): required — must match the ca_session_id that owns the open bundle; previews
  the current draft in the Edit Subdirectory without CA lock or session_view.
  ```

  ### 3. `parameters.project_id` and `parameters.file_path` — update descriptions

  - `project_id`: "Project UUID. Required for both one-shot and open-file preview modes."
  - `file_path`: "Project-relative literal path. Required. No globs."

