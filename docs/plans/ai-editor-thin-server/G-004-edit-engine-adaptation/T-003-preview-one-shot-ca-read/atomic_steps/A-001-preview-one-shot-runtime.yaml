prompt: |
  Modify **`ai_editor/commands/universal_file_preview_runtime.py` only** (operation: modify_file).
  Implement the **one-shot preview branch** (C-011, {5l1i}): read-only preview of a file that is
  **not** open in the editor workspace, via Upstream Client `download_without_lock` (C-017/C-023).
  Do **not** modify `preview_command_metadata.py`, `universal_file_preview_command.py`, or any test
  file in this step.

  ## Starting file state (post G-004/T-002 open-file preview)

  The embedded baseline below already includes SessionGuard PREVIEW in the facade and the
  open-file workspace draft dispatch in `run_preview_execute` (G-004/T-002). Extend that
