  ```py
  """MCP command: universal_file_preview — facade (C-016)."""
  from __future__ import annotations

  import logging
  from typing import Any, Dict, cast

  from mcp_proxy_adapter.commands.result import ErrorResult, SuccessResult

  from ..core.exceptions import ValidationError
  from .base_mcp_command import BaseMCPCommand
  from .preview_command_metadata import get_universal_file_preview_metadata
  from .universal_file_preview_runtime import run_preview_execute

  logger = logging.getLogger(__name__)


  class UniversalFilePreviewCommand(BaseMCPCommand):
      name = "universal_file_preview"
      version = "1.0.0"
      descr = "Structured read-only file preview"
      category = "universal_file"
      author = "Vasiliy Zdanovskiy"
      email = "vasilyvz@gmail.com"

      @classmethod
      def get_schema(cls) -> Dict[str, Any]:
          return {
              "type": "object",
              "properties": {
                  "project_id": {"type": "string"},
                  "file_path": {"type": "string"},
                  "session_id": {"type": "string"},
              },
              "required": ["project_id", "file_path"],
              "additionalProperties": False,
          }

      @classmethod
      def metadata(cls) -> Dict[str, Any]:
          return get_universal_file_preview_metadata(cls)

      def validate_params(self, params: Dict[str, Any]) -> Dict[str, Any]:
          return super().validate_params(params)

      def execute(self, **kwargs: Any) -> SuccessResult | ErrorResult:
          try:
              return run_preview_execute(self, **kwargs)
          except ValidationError as exc:
              return ErrorResult(message=str(exc), code=cast(Any, "VALIDATION_ERROR"))
          except Exception as exc:
              logger.error("universal_file_preview failed: %s", exc, exc_info=True)
              return ErrorResult(message=str(exc), code=cast(Any, "HANDLER_ERROR"))
  ```

  ## Required refactor before adding one-shot dispatch

  1. Extract a private helper `_run_preview_on_abs_path(
       command: Any,
       kwargs: dict[str, Any],
       abs_file_path: Path,
     ) -> SuccessResult | ErrorResult` from the T-002 open-file handler pipeline (T-002 steps 8–14:
     handler dispatch, addressing, tree-temp, budget, navigate, envelope build). The helper must
     accept an absolute path and reuse the same read-only preview logic T-002 uses for
     `edit_session.draft_path`.
  2. Refactor the existing T-002 open-file body so it resolves `edit_session`, validates
     `project_id`, merges params, sets `abs_file_path` from draft, then calls
     `_run_preview_on_abs_path(command, kwargs, Path(abs_file_path))`.
  3. Keep T-002 open-file entry conditions unchanged: non-empty `session_id`, successful
     `get_session`, matching `project_id`.

  ## Imports to add for one-shot (exact)

  Add these imports (keep all existing imports):

  ```
  import tempfile
  from pathlib import Path
  from typing import Any, cast

  from ai_editor.commands.universal_file_edit.session import lookup_ca_session_id
  from ai_editor.core.upstream.code_analysis_client import get_code_analysis_client
  from ai_editor.core.upstream.session_guard import GuardDecision, OperationKind, SessionGuard
  ```

  ## `run_preview_execute` dispatch algorithm (add at function start)

  Insert this dispatch **before** the T-002 open-file branch body:

  1. Read `project_id = str(kwargs.get("project_id", "")).strip()`.
  2. Read `file_path = str(kwargs.get("file_path", "")).strip()`.
  3. Read `ca_session_id = str(kwargs.get("session_id", "")).strip()` (optional CA context).
  4. Call `open_owner = lookup_ca_session_id(project_id, file_path)`.
  5. **If `open_owner` is not None** (file has an open bundle for this project/path):
     - If `ca_session_id` is empty:
       - Return immediately `ErrorResult` with:
         - `code`: `"OPEN_FILE_USE_WORKSPACE_PREVIEW"` (use `cast(Any, ...)`)
         - `message`: `"File is open in editor workspace; pass session_id to preview the workspace draft"`
         - `details`: `{"project_id": project_id, "file_path": file_path, "session_id": open_owner}`
       - Do **not** call `download_without_lock`, do **not** read workspace copy via one-shot,
         do **not** call `session_view` or `session_open_file`.
     - If `ca_session_id` is non-empty: fall through to the existing T-002 open-file branch
       (do not return one-shot rejection).
  6. **One-shot branch** (`open_owner` is None):
     a. If `ca_session_id` is non-empty:
        - `guard = SessionGuard(get_code_analysis_client())`
        - `decision = guard.check(OperationKind.PREVIEW, ca_session_id)`
        - If `decision == GuardDecision.REJECT`:
          return `ErrorResult(message=f"CA session not found or invalid: {ca_session_id}",
          code=cast(Any, "SESSION_NOT_FOUND"))`
        - If `decision == GuardDecision.ALLOW`: proceed.
        - If `decision == GuardDecision.ALLOW_TERMINATING`: treat as ALLOW for preview (read-only).
     b. `client = get_code_analysis_client()`
     c. `raw_bytes = client.download_without_lock(project_id=project_id, file_path=file_path)`
        - On `ValidationError`: re-raise (facade maps to VALIDATION_ERROR).
        - On `RuntimeError` as exc: return `ErrorResult(message=str(exc), code=cast(Any, "UPSTREAM_ERROR"))`
     d. Create ephemeral temp file (no File Subtree, no bundle registry write):
        - `suffix = Path(file_path).suffix or ".bin"`
        - `with tempfile.NamedTemporaryFile(delete=False, suffix=suffix) as tmp:`
        - `tmp.write(raw_bytes)`; `ephemeral_abs = Path(tmp.name)`
     e. Build `preview_kwargs = dict(kwargs)`; set `preview_kwargs["_preview_abs_path"] = str(ephemeral_abs)`.
     f. Call `_run_preview_on_abs_path(command, preview_kwargs, ephemeral_abs)` → result.
     g. In `finally`: `ephemeral_abs.unlink(missing_ok=True)`.
     h. Return result. Response `session_origin` in envelope must remain `"none"` (no tree/session created).
  7. **Open-file branch** (reached only when `open_owner` is not None and `ca_session_id` non-empty):
     execute the refactored T-002 open-file algorithm unchanged.

  ## Error handling

  - `OPEN_FILE_USE_WORKSPACE_PREVIEW`: when `lookup_ca_session_id` returns non-None and `session_id` omitted.
  - `SESSION_NOT_FOUND`: guard REJECT when optional `session_id` provided on one-shot path.
  - `UPSTREAM_ERROR`: `download_without_lock` RuntimeError.
  - Do **not** catch and swallow `ValidationError` inside runtime — let facade handle.
  - Never call forbidden upstream view APIs or `session_open_file` for preview-only one-shot.

  ## Edge cases

  - File open in workspace but caller omits `session_id` → `OPEN_FILE_USE_WORKSPACE_PREVIEW` (not one-shot).
  - File open with valid `session_id` → T-002 open-file branch (not one-shot).
  - File not open, no `session_id` → one-shot without guard touch.
  - File not open, valid `session_id` → guard ALLOW then one-shot download.
  - File not open, invalid `session_id` → `SESSION_NOT_FOUND`, no download.
  - Empty `project_id` or `file_path` → `ValidationError` from upstream client (unchanged).
  - Temp file always deleted even on preview handler failure.

  ## Constants and literals

  - Error codes: `"OPEN_FILE_USE_WORKSPACE_PREVIEW"`, `"SESSION_NOT_FOUND"`, `"UPSTREAM_ERROR"`.
  - Guard kind: `OperationKind.PREVIEW`.
  - Envelope `session_origin` for one-shot success: `"none"`.

  ## Forbidden

  - Do **not** modify any file other than `universal_file_preview_runtime.py`.
  - Do **not** call `session_view` or any forbidden upstream view API.
  - Do **not** call `session_open_file` for preview-only one-shot.
  - Do **not** create File Subtree (C-006) or write bundle registry entries on one-shot path.
  - Do **not** add bare marker comments (`# preview-guard-integrated`, `# preview-opened-workspace branch`).
  - Do **not** use `get_project_root` for one-shot byte fetch (use `download_without_lock` only).
  - Keep file ≤400 lines.

