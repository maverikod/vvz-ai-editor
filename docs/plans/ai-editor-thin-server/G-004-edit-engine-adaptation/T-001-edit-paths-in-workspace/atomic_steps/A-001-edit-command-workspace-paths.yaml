  ## Method to modify: `execute`

  Keep signature, docstring, and `_apply_sidecar` / `_apply_tree_temp` / `_apply_text`
  unchanged. Replace the method body algorithm as follows.

  ### Algorithm (step-by-step)

  1. `del project_id, kwargs` (unchanged).
  2. `ca_session_id = str(session_id).strip()`.
  3. Construct `guard = SessionGuard(get_code_analysis_client())`.
  4. Call `decision = guard.check(OperationKind.EDIT, ca_session_id)`.
  5. If `decision == GuardDecision.REJECT` **or** `decision == GuardDecision.ALLOW_TERMINATING`:
     - Return immediately `error_result_from_make_error(make_error(SESSION_NOT_FOUND, f"CA session not found or invalid: {ca_session_id}"))`.
     - Do **not** call `get_session` and do **not** invoke any `_apply_*` helper.
  6. If `decision == GuardDecision.ALLOW`:
     - Enter existing `try`/`except ValueError` block calling
       `session = get_session(ca_session_id, file_path=file_path or None)`.
     - Preserve existing ValueError handling for `SESSION_FILE_PATH_REQUIRED` and unknown session.
  7. Dispatch by `session.format_group` exactly as baseline (FORMAT_SIDECAR → validate +
     `_apply_sidecar`; FORMAT_TREE_TEMP → `_apply_tree_temp`; else → `_apply_text`).
  8. All mutation helpers must continue to write only via `session.draft_path` and
     `session.core` paths already bound to Edit Subdirectory at open — **never** open or
     write `session.abs_path` (Origin Snapshot C-007).
  9. Preserve invalid-session warning branch unchanged.

  ### Workspace path contract (C-008, C-011)

  - `session_id` parameter is the **CA session id** (same key used by open orchestration
    with `file_workspace_layout` / `allocate_edit_subdir`).
  - `get_session(ca_session_id, ...)` returns the workspace-bound facade; do **not** resolve
    canonical upstream project root via `get_project_root(project_id)` or
    `_resolve_project_root_near`.
  - Origin Snapshot bytes on disk (`session.abs_path` / `FileWorkspaceLayout.origin_path`)
    must remain unchanged by edit operations; only working copy under Edit Subdirectory
    (`session.draft_path`) is mutated.
  - Do **not** re-allocate edit subdir or re-layout paths in this command.

  ### Error handling

  - Guard rejection (step 5): return `ErrorResult` via `error_result_from_make_error`;
    never raise.
  - `get_session` ValueError paths: unchanged mapping to `SESSION_NOT_FOUND`.
  - Sidecar validation / apply errors: unchanged.
  - Do **not** call `validate_ca_session` directly — SessionGuard subsumes C-014 validation.

  ### Edge cases

  - Empty or whitespace `session_id` → guard REJECT → SESSION_NOT_FOUND, no mutations.
  - CA session NOT_FOUND/invalid → guard REJECT → SESSION_NOT_FOUND, no mutations.
  - Multi-file bundle without `file_path` → existing SESSION_FILE_PATH_REQUIRED message.
  - Guard ALLOW + valid session → mutations hit workspace `session.draft_path` only.
  - `ALLOW_TERMINATING` on EDIT → treat as REJECT (normal edit forbidden on broken session).

  ### Constants and literals

  - Guard operation kind: `OperationKind.EDIT`.
  - Error code for guard/local session failures: `SESSION_NOT_FOUND` (via `make_error`).
  - Guard rejection message template: `"CA session not found or invalid: {ca_session_id}"`.

  ## Methods unchanged

  - `get_name`, `metadata`, `_apply_sidecar`, `_apply_tree_temp`, `_apply_text` — no edits.

