  Modify `ai_editor/commands/universal_file_preview_runtime.py` only.
  Implement **open-file preview mode** (Edit Stage C-011, Edit Subdirectory C-008)
  inside `run_preview_execute`. Scope is **T-002 only** — when CA session id,
  `project_id`, and `file_path` match an open file bundle, read the workspace
  draft via Internal Edit Engine handlers. Do **not** implement one-shot upstream
  read (that is G-004/T-003). Do **not** modify `universal_file_preview_command.py`
  in this step.

  ## Prerequisite — facade guard already on disk (G-007)

  G-004/T-002 builds on completed G-007 session-guard work. On disk,
  `UniversalFilePreviewCommand.execute` already calls
  `SessionGuard.check(OperationKind.PREVIEW, ca_session_id)` (C-024; delegates
  C-014 Session Validation touch via upstream) and only then delegates to
  `run_preview_execute`. This step adds the open-file workspace branch inside
  runtime only; do not modify the facade.

  ## MRS concepts (relevant excerpt)

  - **C-008 Edit Subdirectory**: workspace draft/CST/tree-temp copy; sole mutation
    target on edit stage; preview reads this copy, not origin snapshot.
  - **C-011 Edit Stage**: preview is read-only inside open Edit Subdirectory;
    no session_view; no CA lock acquisition for preview.
  - **C-014 Session Validation**: mandatory before preview; entry point is C-024;
    SESSION_NOT_FOUND when CA session absent; only via Upstream Client touch
    (handled in facade guard — do not call `validate_ca_session` directly here).
  - **C-016 MCP Workflow Surface**: slim facade delegates orchestration to this
    runtime module.
  - **C-024 Session Guard**: normal operation PREVIEW; REJECT on NOT_FOUND
    (enforced in facade before runtime entry).

