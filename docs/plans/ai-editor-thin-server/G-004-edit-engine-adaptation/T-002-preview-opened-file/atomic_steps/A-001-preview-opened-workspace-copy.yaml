  ## Function to implement: `run_preview_execute(command: Any, **kwargs: Any) -> Union[SuccessResult, ErrorResult]`

  Replace the `NotImplementedError` body with the open-file-only algorithm below.
  Keep the function **synchronous** (facade calls it without await).

  ### Algorithm (step-by-step — open-file mode ONLY)

  1. Read `ca_session_id = str(kwargs.get("session_id", "")).strip()`.
  2. Read `project_id = str(kwargs.get("project_id", "")).strip()`.
  3. Read `file_path = str(kwargs.get("file_path", "")).strip()`.
  4. If `ca_session_id` is empty:
     - Return `error_result_from_make_error(make_error(SESSION_NOT_FOUND, "session_id is required for open-file preview"))`.
     - Do **not** fall through to one-shot upstream read.
  5. Resolve open edit session:
     - Call `get_session(ca_session_id, file_path=file_path or None)` inside `try`.
     - On `ValueError` with message `"SESSION_FILE_PATH_REQUIRED"`:
       return `error_result_from_make_error(make_error(SESSION_NOT_FOUND, "file_path is required when the session has multiple open files"))`.
     - On any other `ValueError`:
       return `error_result_from_make_error(make_error(SESSION_NOT_FOUND, f"Unknown session: {ca_session_id}"))`.
     - Do **not** fall through to one-shot when session lookup fails.
  6. If `str(edit_session.project_id) != project_id`:
     - Return `ErrorResult(message="session_id does not match project_id", code=cast(Any, "VALIDATION_ERROR"))`.
  7. Merge preview params with open session:
     - Call `merged = merge_edit_session_into_preview_params(kwargs)`.
     - If `isinstance(merged, PreviewError)`:
       return `ErrorResult(message=merged.message, code=cast(Any, merged.code), details=merged.details or {})`.
     - Set `kwargs = merged`.
  8. Resolve read path from Edit Subdirectory (C-008), **not** canonical project root:
     - `abs_file_path = str(kwargs.get("_preview_abs_path") or edit_session.draft_path)`.
     - `workspace_edit_root = Path(str(edit_session.workspace_edit_subdir)).resolve()` when attribute present, else `Path(abs_file_path).parent.resolve()`.
     - `project_root = workspace_edit_root` (navigation/handlers use this as root for open-file mode).
     - Do **not** call `command._resolve_project_root(project_id)` for the preview source path.
  9. Handler dispatch (Internal Edit Engine — read-only):
     - `dispatcher = HandlerDispatcher()`.
     - `handler_result = dispatcher.dispatch(file_path)`.
     - If `PreviewError`: return `ErrorResult` with its code/message/details.
     - Else `handler = handler_result`.
  10. Addressing validation:
      - `parseable = preview_source_is_parseable(Path(abs_file_path))`.
      - `addressing_err = check_preview_addressing(parseable=parseable, params=kwargs, file_path=file_path)`.
      - If not None: return `ErrorResult` from addressing_err.
  11. Tree-temp sidecar roots (when applicable):
      - Build `nav_kwargs = dict(kwargs)`.
      - For JSON/YAML handler + UUID sidecar `node_ref`: set `nav_kwargs["tree_temp_roots"]` from `edit_session.tree_temp_roots` when not invalid; if None and sidecar needed, call `acquire_tree_temp_for_open(project_root=Path(abs_file_path).parent.resolve(), source_abs=Path(abs_file_path).resolve(), handler_id=..., raw_source_bytes=Path(abs_file_path).read_bytes())` — **read bytes from draft path only**.
  12. Preview budget defaults:
      - `defaults = get_preview_config_defaults()`.
      - Build `PreviewBudget` from kwargs keys with int casts and defaults from `defaults` dict (same keys as monolith: `preview_lines`, `value_preview_len`, `full_text_max_lines`, `max_chars`, `preview_offset`).
  13. Navigate and build envelope:
      - Set `nav_kwargs["file_path"] = abs_file_path`, `nav_kwargs["project_root"] = project_root`, `nav_kwargs["rel_file_path"] = file_path`, `nav_kwargs["preview_budget"] = budget`.
      - `navigation_result = navigate(handler, nav_kwargs, budget)`.
      - If `PreviewError`: return ErrorResult.
      - `session_origin = "caller_owned"` (open edit session).
      - `envelope = build_envelope(navigation_result, kwargs.get("selector"), session_origin)`.
      - Apply invalid-node pagination identically to monolith (`apply_preview_pagination`, `mode_notice_text`).
  14. Return `SuccessResult(data=envelope_or_paginated)`.

  Wrap steps 9–14 in `try/except Exception`:
  - Log `logger.error("universal_file_preview open-file failed: %s", exc, exc_info=True)`.
  - Return `ErrorResult(message=str(exc), code=cast(Any, "HANDLER_ERROR"))`.

  ### Error handling

  - Session/bundle miss (steps 4–6): return ErrorResult via `error_result_from_make_error` or direct ErrorResult; never raise.
  - `merge_edit_session_into_preview_params` failure: return ErrorResult; never raise PreviewError.
  - Handler/navigation failures: return ErrorResult with stable codes from PreviewError.
  - Unexpected exceptions in handler pipeline: log + HANDLER_ERROR.

  ### Edge cases

  - `session_id` missing/blank → SESSION_NOT_FOUND (step 4); no one-shot fallback.
  - Valid CA id but no local open bundle → SESSION_NOT_FOUND (step 5).
  - Multi-file session without `file_path` → SESSION_NOT_FOUND with SESSION_FILE_PATH_REQUIRED message.
  - `project_id` mismatch with open bundle → VALIDATION_ERROR.
  - Sidecar/text/tree-temp sessions: `_preview_abs_path` must point to `edit_session.draft_path` under Edit Subdirectory.
  - Origin snapshot bytes on disk must not be read when draft path is set.

  ### Constants and literals

  - Error codes: `"SESSION_NOT_FOUND"`, `"VALIDATION_ERROR"`, `"HANDLER_ERROR"`.
  - `session_origin` for open-file success: `"caller_owned"`.
  - Log template: `"universal_file_preview open-file failed: %s"`.

